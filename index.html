<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lodash.js/4.17.21/lodash.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/backbone.js/1.4.1/backbone-min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jointjs/3.7.7/joint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dagre/0.8.5/dagre.min.js"></script>
<script>
'use strict';

// ═══════════════════════════════════════════════════════════════
// EventEmitter — minimal pub/sub base class
// ═══════════════════════════════════════════════════════════════
class EventEmitter {
  constructor() {
    this._listenersByEvent = {};
  }

  on(eventName, callbackFn) {
    if (!this._listenersByEvent[eventName]) this._listenersByEvent[eventName] = [];
    this._listenersByEvent[eventName].push(callbackFn);
    return this;
  }

  off(eventName, callbackFn) {
    if (!this._listenersByEvent[eventName]) return this;
    this._listenersByEvent[eventName] = this._listenersByEvent[eventName].filter(fn => fn !== callbackFn);
    return this;
  }

  emit(eventName, ...args) {
    (this._listenersByEvent[eventName] || []).forEach(fn => fn(...args));
    return this;
  }
}

// ═══════════════════════════════════════════════════════════════
// Vertex — a single movable point on a connection path
// ═══════════════════════════════════════════════════════════════
class Vertex extends EventEmitter {
  constructor(parentLink, vertexIndex) {
    super();
    this.id = `vertex-${Math.random().toString(36).slice(2)}`;
    this._parentLink = parentLink;
    this._vertexIndex = vertexIndex;
  }

  get x() { return this._parentLink.vertices()[this._vertexIndex]?.x ?? 0; }
  get y() { return this._parentLink.vertices()[this._vertexIndex]?.y ?? 0; }

  moveTo(newX, newY) {
    const allVertices = [...this._parentLink.vertices()];
    allVertices[this._vertexIndex] = { x: newX, y: newY };
    this._parentLink.vertices(allVertices);
    this.emit('move', this);
    return this;
  }

  moveBy(deltaX, deltaY) {
    return this.moveTo(this.x + deltaX, this.y + deltaY);
  }

  remove() {
    const allVertices = [...this._parentLink.vertices()];
    allVertices.splice(this._vertexIndex, 1);
    this._parentLink.vertices(allVertices);
    this.emit('remove', this);
  }
}

// ═══════════════════════════════════════════════════════════════
// Arrow marker definitions for connection endpoints
// ═══════════════════════════════════════════════════════════════
const ARROW_MARKERS = {
  none:    null,
  classic: { type: 'path', d: 'M 10 -5 0 0 10 5 Z' },
  block:   { type: 'path', d: 'M 10 -10 0 0 10 10 Z' }
};

// ═══════════════════════════════════════════════════════════════
// Connection — wraps a JointJS link with a friendlier API
// ═══════════════════════════════════════════════════════════════
class Connection extends EventEmitter {
  constructor(jointLink, sourceShape, targetShape, parentCanvas) {
    super();
    this._jointLink   = jointLink;
    this._sourceShape = sourceShape;
    this._targetShape = targetShape;
    this._parentCanvas = parentCanvas;
    this._vertices    = [];
  }

  get id()     { return this._jointLink.id; }
  get source() { return this._sourceShape; }
  get target() { return this._targetShape; }

  get label() { return this._jointLink.label(0)?.attrs?.text?.text || ''; }
  set label(newLabel) { this._applyLabelToLink(newLabel); this.emit('change', this); }

  get labelColor() { return this._jointLink.label(0)?.attrs?.text?.fill || '#333333'; }
  set labelColor(newColor) { this._jointLink.prop('labelColor', newColor); this._applyLabelToLink(this.label); this.emit('change', this); }

  get labelFontSize() { return this._jointLink.get('fontSizePercent') || 100; }
  set labelFontSize(newSizePercent) { this._jointLink.set('fontSizePercent', newSizePercent); this._applyLabelToLink(this.label); this.emit('change', this); }

  get lineColor() { return this._jointLink.attr('line/stroke') || '#495057'; }
  set lineColor(newColor) { this._jointLink.attr('line/stroke', newColor); this.emit('change', this); }

  get lineWidth() { return this._jointLink.attr('line/strokeWidth') || 2; }
  set lineWidth(newWidth) { this._jointLink.attr('line/strokeWidth', newWidth); this.emit('change', this); }

  get lineStyle() {
    const dashArray = this._jointLink.attr('line/strokeDasharray') || '';
    return dashArray === '5,5' ? 'dashed' : dashArray === '1,5' ? 'dotted' : 'solid';
  }
  set lineStyle(newStyle) {
    this._jointLink.attr('line/strokeDasharray', newStyle === 'dashed' ? '5,5' : newStyle === 'dotted' ? '1,5' : '');
    this.emit('change', this);
  }

  get sourceArrow() { return this._markerTypeFromDefinition(this._jointLink.attr('line/sourceMarker')); }
  set sourceArrow(arrowType) { this._jointLink.attr('line/sourceMarker', ARROW_MARKERS[arrowType] || null); this.emit('change', this); }

  get targetArrow() { return this._markerTypeFromDefinition(this._jointLink.attr('line/targetMarker')); }
  set targetArrow(arrowType) { this._jointLink.attr('line/targetMarker', ARROW_MARKERS[arrowType] || null); this.emit('change', this); }

  get connectorType() {
    const connectorName = this._jointLink.connector()?.name;
    const routerName    = this._jointLink.router()?.name;
    return connectorName === 'smooth' ? 'curved' : routerName === 'normal' ? 'straight' : 'elbow';
  }
  set connectorType(newType) {
    const gridSize = this._parentCanvas._gridSize;
    if (newType === 'elbow')         { this._jointLink.router('manhattan', { step: gridSize, padding: 20 }); this._jointLink.connector('rounded'); }
    else if (newType === 'straight') { this._jointLink.router('normal'); this._jointLink.connector('normal'); }
    else                             { this._jointLink.router('normal'); this._jointLink.connector('smooth'); }
    this.emit('change', this);
  }

  get sourcePort() { return this._jointLink.get('sourcePort') ?? null; }
  set sourcePort(portIndex) { this._setEndpointPort('source', portIndex); }

  get targetPort() { return this._jointLink.get('targetPort') ?? null; }
  set targetPort(portIndex) { this._setEndpointPort('target', portIndex); }

  get description() { return this._jointLink.get('description') || ''; }
  set description(newDescription) { this._jointLink.set('description', newDescription); this.emit('change', this); }

  getVertices() { return [...this._vertices]; }

  addVertex(x, y) {
    const allVertices = [...this._jointLink.vertices(), { x, y }];
    this._jointLink.vertices(allVertices);
    const newVertex = new Vertex(this._jointLink, allVertices.length - 1);
    this._vertices.push(newVertex);
    return newVertex;
  }

  select()   { this._parentCanvas._selectCellOrConnection(this); return this; }
  deselect() { this._parentCanvas._deselectAll(); return this; }
  remove()   { this._jointLink.remove(); this.emit('remove', this); }

  _applyLabelToLink(labelText) {
    const fontSize  = 12 * ((this._jointLink.get('fontSizePercent') || 100) / 100);
    const textColor = this._jointLink.get('labelColor') || '#333333';
    this._jointLink.labels(labelText
      ? [{ attrs: { text: { text: labelText, fill: textColor, fontSize, textVerticalAnchor: 'middle' }, rect: { fill: 'white', opacity: 0.9 } }, position: { distance: 0.5 } }]
      : []
    );
  }

  _markerTypeFromDefinition(markerDefinition) {
    if (!markerDefinition) return 'none';
    if (markerDefinition.d === ARROW_MARKERS.classic.d) return 'classic';
    if (markerDefinition.d === ARROW_MARKERS.block.d)   return 'block';
    return 'none';
  }

  _setEndpointPort(endpointSide, portIndex) {
    const endpointShape = endpointSide === 'source' ? this._sourceShape : this._targetShape;
    this._jointLink.set(`${endpointSide}Port`, portIndex);
    if (portIndex === null) {
      this._jointLink[endpointSide]({ id: endpointShape._jointCell.id });
    } else {
      const portDefinition = endpointShape._jointCell.getPorts()[portIndex - 1];
      if (portDefinition) this._jointLink[endpointSide]({ id: endpointShape._jointCell.id, port: portDefinition.id });
    }
    this.emit('change', this);
  }
}

// ═══════════════════════════════════════════════════════════════
// Shape — base class wrapping a JointJS element
// ═══════════════════════════════════════════════════════════════
class Shape extends EventEmitter {
  constructor(options = {}) {
    super();
    this._label        = typeof options === 'string' ? options : (options.label ?? '');
    this._initOptions  = typeof options === 'string' ? {} : options;
    this._jointCell    = null;
    this._parentCanvas = null;
    this._propertySchema    = {};
    this._customPropertyValues = {};
    this._renderFunction   = null;
  }

  getCustomProperty(propertyKey) { return this._customPropertyValues[propertyKey]; }

  setCustomProperty(propertyKey, newValue) {
    this._customPropertyValues[propertyKey] = newValue;
    this._jointCell?.set(`custom_${propertyKey}`, newValue);
    if (this._renderFunction) this._renderFunction(this);
    this.emit('change', this);
  }

  getSchema() { return this._propertySchema; }

  get id()     { return this._jointCell?.id ?? null; }
  get x()      { return this._jointCell?.position().x ?? 0; }
  set x(newX)  { this._jointCell?.position(newX, this.y); this.emit('change', this); }
  get y()      { return this._jointCell?.position().y ?? 0; }
  set y(newY)  { this._jointCell?.position(this.x, newY); this.emit('change', this); }
  get width()  { return this._jointCell?.size().width ?? 0; }
  get height() { return this._jointCell?.size().height ?? 0; }
  get portCount() { return 4; }

  get label()           { return this._jointCell?.attr('label/text') ?? this._label; }
  set label(newLabel)   { this._jointCell?.attr('label/text', newLabel); this._label = newLabel; this._autoResizeToFitContent(); this.emit('change', this); }

  get labelColor()      { return this._jointCell?.attr('label/fill') ?? '#212529'; }
  set labelColor(newColor) { this._jointCell?.attr('label/fill', newColor); this.emit('change', this); }

  get labelFontSize()   { return this._jointCell?.get('fontSizePercent') ?? 100; }
  set labelFontSize(newSizePercent) { this._jointCell?.set('fontSizePercent', newSizePercent); this._autoResizeToFitContent(); this.emit('change', this); }

  get description()     { return this._jointCell?.get('description') ?? ''; }
  set description(newDescription) { this._jointCell?.set('description', newDescription); this._jointCell?.attr('descriptionLabel/text', newDescription); this._autoResizeToFitContent(); this.emit('change', this); }

  get descriptionColor()      { return this._jointCell?.attr('descriptionLabel/fill') ?? '#6c757d'; }
  set descriptionColor(newColor) { this._jointCell?.attr('descriptionLabel/fill', newColor); this.emit('change', this); }

  get backgroundColor()       { return this._jointCell?.attr('body/fill') ?? '#ffffff'; }
  set backgroundColor(newColor)  { this._jointCell?.attr('body/fill', newColor); this.emit('change', this); }

  get borderColor()     { return this._jointCell?.attr('body/stroke') ?? '#adb5bd'; }
  set borderColor(newColor) { this._jointCell?.attr('body/stroke', newColor); this.emit('change', this); }

  get borderWidth()     { return this._jointCell?.attr('body/strokeWidth') ?? 2; }
  set borderWidth(newWidth) { this._jointCell?.attr('body/strokeWidth', newWidth); this.emit('change', this); }

  get imageUrl()        { return this._jointCell?.get('imageUrl') ?? ''; }
  set imageUrl(newUrl)  { this._jointCell?.set('imageUrl', newUrl); this._jointCell?.attr('image/xlink:href', newUrl); this._jointCell?.attr('image/display', newUrl ? 'block' : 'none'); this._autoResizeToFitContent(); this.emit('change', this); }

  get imageWidth()      { return this._jointCell?.get('imageWidth') ?? 32; }
  set imageWidth(newWidth) { this._jointCell?.set('imageWidth', newWidth); this._autoResizeToFitContent(); this.emit('change', this); }

  get imageHeight()     { return this._jointCell?.get('imageHeight') ?? 32; }
  set imageHeight(newHeight) { this._jointCell?.set('imageHeight', newHeight); this._autoResizeToFitContent(); this.emit('change', this); }

  get status()          { return this._jointCell?.get('status') ?? 'pending'; }
  set status(newStatus) { this._jointCell?.set('status', newStatus); this.emit('change', this); }

  get priority()        { return this._jointCell?.get('priority') ?? 1; }
  set priority(newPriority) { this._jointCell?.set('priority', newPriority); this.emit('change', this); }

  moveTo(newX, newY)       { this._jointCell?.position(newX, newY); this.emit('move', this); return this; }
  moveBy(deltaX, deltaY)   { return this.moveTo(this.x + deltaX, this.y + deltaY); }
  toFront()                { this._jointCell?.toFront(); return this; }
  toBack()                 { this._jointCell?.toBack(); return this; }
  select()                 { this._parentCanvas?._selectCellOrConnection(this); return this; }
  deselect()               { this._parentCanvas?._deselectAll(); return this; }

  getConnections()         { return this._parentCanvas?._getConnectionsForShape(this) ?? []; }
  getIncomingConnections() { return this.getConnections().filter(conn => conn.target === this); }
  getOutgoingConnections() { return this.getConnections().filter(conn => conn.source === this); }

  connect(targetShape, sourcePortIndex = null, targetPortIndex = null) {
    if (targetShape === this) throw new Error('A shape cannot connect to itself.');
    return this._parentCanvas?._createConnection(this, targetShape, sourcePortIndex, targetPortIndex);
  }

  remove() { this._jointCell?.remove(); this.emit('remove', this); }

  _buildJointCell(position, jointNamespace) { throw new Error('_buildJointCell must be implemented by subclass'); }
  _autoResizeToFitContent() { if (!this._parentCanvas || !this._jointCell) return; this._parentCanvas._autoResizeCellToFitContent(this._jointCell); }
  _getShapeType() { return 'rect'; }
}

// ═══════════════════════════════════════════════════════════════
// Shape.define — factory for custom shape classes
// ═══════════════════════════════════════════════════════════════
Shape.define = function(BaseShapeClass, defaultOptions = {}, propertySchema = {}, renderFunction = null) {
  class CustomShape extends BaseShapeClass {
    constructor(options = {}) {
      super();
      this._customPropertyValues = {};
      this._propertySchema       = propertySchema;
      this._renderFunction       = renderFunction;
      this._defaultOptions       = defaultOptions;

      const mergedOptions = { ...defaultOptions, ...options };
      const builtInPropertyNames = ['label','labelColor','labelFontSize','description','descriptionColor','backgroundColor','borderColor','borderWidth','imageUrl','imageWidth','imageHeight','status','priority'];
      builtInPropertyNames.forEach(key => { if (mergedOptions[key] !== undefined) this[`_init_${key}`] = mergedOptions[key]; });
      this._label = mergedOptions.label ?? defaultOptions.label ?? '';

      Object.entries(propertySchema).forEach(([key, definition]) => {
        this._customPropertyValues[key] = options[key] !== undefined ? options[key] : definition.default;
      });
    }

    getCustomProperty(propertyKey) { return this._customPropertyValues[propertyKey]; }

    setCustomProperty(propertyKey, newValue) {
      if (!(propertyKey in this._propertySchema)) throw new Error(`Unknown custom property: ${propertyKey}`);
      this._customPropertyValues[propertyKey] = newValue;
      this._jointCell?.set(`custom_${propertyKey}`, newValue);
      if (this._renderFunction) this._renderFunction(this);
      this.emit('change', this);
    }

    getSchema() { return this._propertySchema; }
    _buildJointCell(position, jointNamespace) { return super._buildJointCell(position, jointNamespace); }
  }

  CustomShape.prototype._getShapeType = BaseShapeClass.prototype._getShapeType;
  Object.defineProperty(CustomShape.prototype, 'portCount',
    Object.getOwnPropertyDescriptor(BaseShapeClass.prototype, 'portCount') || { get() { return 4; } }
  );
  return CustomShape;
};

// ═══════════════════════════════════════════════════════════════
// Concrete shape subclasses
// ═══════════════════════════════════════════════════════════════
class Rectangle extends Shape {
  get portCount() { return 4; } _getShapeType() { return 'rect'; }
  _buildJointCell(position, ns) { return _buildRectangleCell(position, ns, 'rect', 140, 50); }
}
class Square extends Shape {
  get portCount() { return 4; } _getShapeType() { return 'square'; }
  _buildJointCell(position, ns) { return _buildRectangleCell(position, ns, 'square', 80, 80); }
}
class Ellipse extends Shape {
  get portCount() { return 4; } _getShapeType() { return 'ellipse'; }
  _buildJointCell(position, ns) { return _buildEllipseCell(position, ns, 'ellipse', 140, 50); }
}
class Circle extends Shape {
  get portCount() { return 4; } _getShapeType() { return 'circle'; }
  _buildJointCell(position, ns) { return _buildEllipseCell(position, ns, 'circle', 80, 80); }
}
class Diamond extends Shape {
  get portCount() { return 4; } _getShapeType() { return 'diamond'; }
  _buildJointCell(position, ns) { return _buildPolygonCell(position, ns, 'diamond', 80, 80, [[0,10],[10,0],[20,10],[10,20]]); }
}
class Triangle extends Shape {
  get portCount() { return 3; } _getShapeType() { return 'triangle'; }
  _buildJointCell(position, ns) { return _buildPolygonCell(position, ns, 'triangle', 140, 50, [[10,0],[20,20],[0,20]]); }
}
class Hexagon extends Shape {
  get portCount() { return 6; } _getShapeType() { return 'hexagon'; }
  _buildJointCell(position, ns) { return _buildPolygonCell(position, ns, 'hexagon', 140, 50, [[5,0],[15,0],[20,10],[15,20],[5,20],[0,10]]); }
}
class Pentagon extends Shape {
  get portCount() { return 5; } _getShapeType() { return 'pentagon'; }
  _buildJointCell(position, ns) { return _buildPolygonCell(position, ns, 'pentagon', 140, 50, [[10,0],[20,7],[16,20],[4,20],[0,7]]); }
}
class Octagon extends Shape {
  get portCount() { return 8; } _getShapeType() { return 'octagon'; }
  _buildJointCell(position, ns) { return _buildPolygonCell(position, ns, 'octagon', 140, 50, [[6,0],[14,0],[20,6],[20,14],[14,20],[6,20],[0,14],[0,6]]); }
}

// ═══════════════════════════════════════════════════════════════
// Shared JointJS cell construction helpers
// ═══════════════════════════════════════════════════════════════
const SHARED_CELL_MARKUP = [
  { tagName: 'image',  selector: 'image',            className: 'image' },
  { tagName: 'text',   selector: 'label',            className: 'label' },
  { tagName: 'text',   selector: 'descriptionLabel', className: 'descriptionLabel' }
];

const SHARED_CELL_ATTRS = {
  image:            { display: 'none' },
  label:            { fill: '#212529', fontSize: 13, fontWeight: 'bold', pointerEvents: 'none' },
  descriptionLabel: { text: '', fill: '#6c757d', fontSize: 11, pointerEvents: 'none' }
};

const SHARED_CELL_PROPS = {
  description: '', status: 'pending', priority: 1,
  imageUrl: '', imageWidth: 32, imageHeight: 32, fontSizePercent: 100
};

function _attachPortsToCell(jointCell, polygonPoints) {
  jointCell.prop('ports/groups', {
    all: {
      position: 'absolute',
      attrs: {
        circle: { r: 6, fill: '#3498db', magnet: true, stroke: '#fff', strokeWidth: 2, pointerEvents: 'all' },
        text:   { display: 'none' }
      }
    }
  });

  const portDefinitions = polygonPoints.length === 0
    ? [
        { group: 'all', args: { x: '50%', y: '0%',   dy: -1 } },
        { group: 'all', args: { x: '100%', y: '50%' } },
        { group: 'all', args: { x: '50%', y: '100%', dy: 1  } },
        { group: 'all', args: { x: '0%',  y: '50%'  } }
      ]
    : polygonPoints.map((point, index) => {
        const nextPoint = polygonPoints[(index + 1) % polygonPoints.length];
        return { group: 'all', args: {
          x: `${((point[0] + nextPoint[0]) / 2 / 20) * 100}%`,
          y: `${((point[1] + nextPoint[1]) / 2 / 20) * 100}%`
        }};
      });

  jointCell.addPorts(portDefinitions);
}

function _buildRectangleCell(position, jointNamespace, shapeType, initialWidth, initialHeight) {
  const cell = new jointNamespace.standard.Rectangle();
  cell.markup = [{ tagName: 'rect', selector: 'body', className: 'body' }, ...SHARED_CELL_MARKUP];
  cell.position(position.x, position.y).resize(initialWidth, initialHeight);
  cell.attr({ body: { fill: '#ffffff', stroke: '#adb5bd', strokeWidth: 2, rx: 5, ry: 5 }, ...SHARED_CELL_ATTRS });
  cell.set({ type: shapeType, ...SHARED_CELL_PROPS });
  _attachPortsToCell(cell, []);
  return cell;
}

function _buildEllipseCell(position, jointNamespace, shapeType, initialWidth, initialHeight) {
  const cell = new jointNamespace.standard.Ellipse();
  cell.markup = [{ tagName: 'ellipse', selector: 'body', className: 'body' }, ...SHARED_CELL_MARKUP];
  cell.position(position.x, position.y).resize(initialWidth, initialHeight);
  cell.attr({ body: { fill: '#ffffff', stroke: '#adb5bd', strokeWidth: 2 }, ...SHARED_CELL_ATTRS });
  cell.set({ type: shapeType, ...SHARED_CELL_PROPS });
  _attachPortsToCell(cell, []);
  return cell;
}

function _buildPolygonCell(position, jointNamespace, shapeType, initialWidth, initialHeight, polygonPoints) {
  const cell = new jointNamespace.standard.Polygon();
  cell.markup = [{ tagName: 'polygon', selector: 'body', className: 'body' }, ...SHARED_CELL_MARKUP];
  cell.position(position.x, position.y).resize(initialWidth, initialHeight);
  cell.attr({ body: { refPoints: polygonPoints.map(p => p.join(',')).join(' '), fill: '#ffffff', stroke: '#adb5bd', strokeWidth: 2 }, ...SHARED_CELL_ATTRS });
  cell.set({ type: shapeType, ...SHARED_CELL_PROPS });
  _attachPortsToCell(cell, polygonPoints);
  return cell;
}

// ═══════════════════════════════════════════════════════════════
// Canvas — the main diagram controller
// ═══════════════════════════════════════════════════════════════
class Canvas extends EventEmitter {
  constructor(hostElement) {
    super();
    this._hostElement        = hostElement;
    this._gridSize           = 10;
    this._shapeClearanceGridUnits = 4;
    this._shapesByJointId    = new Map();
    this._connectionsByJointId = new Map();
    this._selectedItem       = null;
    this._autoPortEnabled    = true;
    this._isDeserializing    = false;
    this._touchGestureState  = null;
    this._pointerDownPosition = null;
    this._wasShapeAlreadySelected = false;
    this._registeredCustomShapes  = {};

    this._buildDOMStructure();
    this._initJointPaper();
    this._bindUIEventHandlers();
    this._bindJointPaperEventHandlers();
    this._bindTouchGestureHandlers();
    this._bindKeyboardShortcuts();

    // Bubble individual mutation events into a single 'change' event
    // (suppressed during deserialize — one 'change' fires at the end instead)
    ['shape:add','shape:remove','shape:change','shape:move','connection:add','connection:remove','connection:change']
      .forEach(eventName => this.on(eventName, () => { if (!this._isDeserializing) this.emit('change'); }));

    if (this._isMobileDevice()) {
      this._setSidebarCollapsedState(this._leftSidebarElement, true);
      this._setSidebarCollapsedState(this._rightSidebarElement, true);
    }
  }

  // ── Public: register a custom shape class in the library panel ──
  registerShape(displayLabel, ShapeClass) {
    const libraryItem = this._libraryPanelElement.appendChild(this._createElement('div', 'wf-node-template'));
    libraryItem.textContent = displayLabel;
    libraryItem.draggable   = true;
    libraryItem.dataset.shapeLabel = displayLabel;

    libraryItem.addEventListener('click', () => {
      if (!this._isMobileDevice()) return;
      this.addShape(new ShapeClass());
      if (!this._leftSidebarElement.classList.contains('wf-collapsed')) this._toggleSidebarCollapsed(this._leftSidebarElement);
    });
    libraryItem.addEventListener('dragstart', event => event.dataTransfer.setData('customShape', displayLabel));

    this._registeredCustomShapes[displayLabel] = ShapeClass;
  }

  // ── Public: add a shape to the canvas, returns a Promise resolving to the shape ──
  addShape(shape, canvasX, canvasY) {
    const jointNamespace = joint.shapes;
    const containerElement = this._canvasContainerElement;
    const centerX = canvasX ?? containerElement.clientWidth  / 2;
    const centerY = canvasY ?? containerElement.clientHeight / 2;

    const localPoint = this._jointPaper.clientToLocalPoint({
      x: centerX + containerElement.getBoundingClientRect().left,
      y: centerY + containerElement.getBoundingClientRect().top
    });

    const isSquarish = shape instanceof Square || shape instanceof Circle || shape instanceof Diamond;
    const initialWidth  = isSquarish ? 80 : 140;
    const initialHeight = isSquarish ? 80 : 50;

    const clearPosition = this._findNearestClearPosition(localPoint.x - initialWidth / 2, localPoint.y - initialHeight / 2, initialWidth, initialHeight);
    const jointCell = shape._buildJointCell(clearPosition, jointNamespace);
    jointCell.attr('label/text', shape._label);

    shape._jointCell    = jointCell;
    shape._parentCanvas = this;

    const builtInPropertyNames = ['label','labelColor','labelFontSize','description','descriptionColor','backgroundColor','borderColor','borderWidth','imageUrl','imageWidth','imageHeight','status','priority'];
    const initOptions = shape._initOptions || {};
    builtInPropertyNames.forEach(key => {
      const value = initOptions[key] ?? shape[`_init_${key}`];
      if (value !== undefined) shape[key] = value;
    });
    Object.entries(shape._customPropertyValues).forEach(([key, value]) => jointCell.set(`custom_${key}`, value));

    jointCell.addTo(this._jointGraph);
    this._shapesByJointId.set(jointCell.id, shape);
    this._deselectAll();

    const readyPromise = (async () => {
      await this._waitForCellToRender(jointCell);
      await this._autoResizeCellAsync(jointCell);
      if (shape._renderFunction) shape._renderFunction(shape);
      await this._waitForCellToRender(jointCell);
      shape.on('change', updatedShape => this.emit('shape:change', updatedShape));
      shape.on('move',   movedShape   => this.emit('shape:move',   movedShape));
      return shape;
    })();

    this.emit('shape:add', shape);
    return readyPromise;
  }

  removeShape(shape) { shape.remove(); this._shapesByJointId.delete(shape.id); this.emit('shape:remove', shape); }
  getShapes()        { return [...this._shapesByJointId.values()]; }
  getConnections()   { return [...this._connectionsByJointId.values()]; }

  // ── Viewport controls ──
  panTo(x, y)       { this._jointPaper.translate(x, y); return this; }
  centerContent()   {
    const boundingBox = this._jointGraph.getBBox(); if (!boundingBox) return this;
    const paperSize = this._jointPaper.getComputedSize();
    this._jointPaper.scale(1, 1);
    this._jointPaper.translate(paperSize.width / 2 - (boundingBox.x + boundingBox.width / 2), paperSize.height / 2 - (boundingBox.y + boundingBox.height / 2));
    return this;
  }
  zoomIn(factor = 1.25)  { this._zoomAroundCenter(factor); return this; }
  zoomOut(factor = 0.8)  { this._zoomAroundCenter(factor); return this; }
  zoomReset()            { this._zoomAroundCenter(1 / this._jointPaper.scale().sx); return this; }
  zoomToFit()            { this._jointPaper.scaleContentToFit({ padding: 50, minScale: 0.2, maxScale: 2 }); return this; }
  getZoomLevel()         { return this._jointPaper.scale().sx; }
  getSelectedItem()      { return this._selectedItem; }
  clearSelection()       { this._deselectAll(); return this; }

  setAutoPortSwitching(enabled) {
    this._autoPortEnabled = enabled;
    this._autoPortToggleButton.classList.toggle('active', enabled);
    if (enabled) this._jointGraph.getElements().forEach(element => this._redistributePortsForElement(element));
    return this;
  }

  autoArrange() {
    const dagreGraph = new dagre.graphlib.Graph();
    dagreGraph.setGraph({ rankdir: 'TB', ranksep: 60, nodesep: 40, marginx: 40, marginy: 40 });
    dagreGraph.setDefaultEdgeLabel(() => ({}));

    this._jointGraph.getElements().forEach(element => {
      const { width, height } = element.size();
      dagreGraph.setNode(element.id, { width, height });
    });
    this._jointGraph.getLinks().forEach(link => {
      const sourceElement = link.getSourceElement();
      const targetElement = link.getTargetElement();
      if (sourceElement && targetElement) dagreGraph.setEdge(sourceElement.id, targetElement.id);
    });

    dagre.layout(dagreGraph);

    this._jointGraph.getElements().forEach(element => {
      const layoutNode = dagreGraph.node(element.id);
      if (!layoutNode) return;
      element.position(Math.round(layoutNode.x - layoutNode.width / 2), Math.round(layoutNode.y - layoutNode.height / 2));
    });

    if (this._autoPortEnabled) {
      this._jointGraph.getElements().forEach(element => this._redistributePortsForElement(element));
    }
    this.centerContent();
    return this;
  }

  // ── Serialize the diagram to a JSON string ──
  serialize() {
    const shapeDataArray = [...this._shapesByJointId.values()].map(shape => ({
      id: shape._jointCell.id,
      shapeClass: shape.constructor.name,
      x: shape.x,
      y: shape.y,
      props: {
        label: shape.label, labelColor: shape.labelColor, labelFontSize: shape.labelFontSize,
        description: shape.description, descriptionColor: shape.descriptionColor,
        backgroundColor: shape.backgroundColor, borderColor: shape.borderColor, borderWidth: shape.borderWidth,
        imageUrl: shape.imageUrl, imageWidth: shape.imageWidth, imageHeight: shape.imageHeight,
      },
      customProps: { ...shape._customPropertyValues },
    }));

    const connectionDataArray = [...this._connectionsByJointId.values()].map(connection => {
      const resolvePortIndex = (endpoint, shape) => {
        const portId = endpoint?.port;
        if (!portId) return null;
        const index = shape._jointCell.getPorts().findIndex(port => port.id === portId);
        return index >= 0 ? index + 1 : null;
      };
      return {
        sourceId:   connection.source._jointCell.id,
        targetId:   connection.target._jointCell.id,
        sourcePort: resolvePortIndex(connection._jointLink.source(), connection.source),
        targetPort: resolvePortIndex(connection._jointLink.target(), connection.target),
        label: connection.label, labelColor: connection.labelColor, labelFontSize: connection.labelFontSize,
        lineColor: connection.lineColor, lineWidth: connection.lineWidth, lineStyle: connection.lineStyle,
        sourceArrow: connection.sourceArrow, targetArrow: connection.targetArrow,
        connectorType: connection.connectorType, description: connection.description,
        vertices: connection._jointLink.vertices(),
      };
    });

    return JSON.stringify({ shapes: shapeDataArray, connections: connectionDataArray });
  }

  // ── Deserialize a JSON string and rebuild the diagram ──
  async deserialize(jsonData) {
    const { shapes: shapeDataArray, connections: connectionDataArray } = typeof jsonData === 'string' ? JSON.parse(jsonData) : jsonData;
    if (!Array.isArray(shapeDataArray)) throw new Error('Invalid diagram file format.');

    this._deselectAll();
    this._shapesByJointId.clear();
    this._connectionsByJointId.clear();
    this._jointGraph.clear();

    const shapeClassMap = {
      Rectangle, Square, Ellipse, Circle, Diamond, Triangle, Hexagon, Pentagon, Octagon,
      ...Object.fromEntries(Object.entries(this._registeredCustomShapes).map(([, cls]) => [cls.name, cls]))
    };

    const prevAutoPortEnabled = this._autoPortEnabled;
    this._autoPortEnabled = false;
    this._isDeserializing = true;

    const oldIdToNewShapeMap = {};

    for (const shapeData of shapeDataArray) {
      const ShapeClass = shapeClassMap[shapeData.shapeClass];
      if (!ShapeClass) { console.warn(`Unknown shape class: ${shapeData.shapeClass}`); continue; }

      const shape = new ShapeClass({ ...shapeData.props, ...shapeData.customProps });
      const jointCell = shape._buildJointCell({ x: shapeData.x, y: shapeData.y }, joint.shapes);
      jointCell.attr('label/text', shape._label);
      shape._jointCell    = jointCell;
      shape._parentCanvas = this;

      const builtInPropertyNames = ['label','labelColor','labelFontSize','description','descriptionColor','backgroundColor','borderColor','borderWidth','imageUrl','imageWidth','imageHeight','status','priority'];
      const initOptions = shape._initOptions || {};
      builtInPropertyNames.forEach(key => {
        const value = initOptions[key] ?? shape[`_init_${key}`];
        if (value !== undefined) shape[key] = value;
      });
      Object.entries(shape._customPropertyValues).forEach(([key, value]) => jointCell.set(`custom_${key}`, value));

      jointCell.addTo(this._jointGraph);
      this._shapesByJointId.set(jointCell.id, shape);

      await new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));
      this._autoResizeCellToFitContent(jointCell);
      await new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));
      this._jointPaper.updateViews();
      if (shape._renderFunction) shape._renderFunction(shape);

      shape.on('change', updatedShape => this.emit('shape:change', updatedShape));
      shape.on('move',   movedShape   => this.emit('shape:move',   movedShape));

      oldIdToNewShapeMap[shapeData.id] = shape;
    }

    for (const connectionData of connectionDataArray) {
      const sourceShape = oldIdToNewShapeMap[connectionData.sourceId];
      const targetShape = oldIdToNewShapeMap[connectionData.targetId];
      if (!sourceShape || !targetShape) continue;

      const connection = sourceShape.connect(targetShape, connectionData.sourcePort, connectionData.targetPort);
      if (!connection) continue;

      if (connectionData.label)         connection.label         = connectionData.label;
      if (connectionData.labelColor)    connection.labelColor    = connectionData.labelColor;
      if (connectionData.labelFontSize) connection.labelFontSize = connectionData.labelFontSize;
      connection.lineColor     = connectionData.lineColor;
      connection.lineWidth     = connectionData.lineWidth;
      connection.lineStyle     = connectionData.lineStyle;
      connection.sourceArrow   = connectionData.sourceArrow;
      connection.targetArrow   = connectionData.targetArrow;
      connection.connectorType = connectionData.connectorType;
      if (connectionData.description)      connection.description = connectionData.description;
      if (connectionData.vertices?.length) connection._jointLink.vertices(connectionData.vertices);
    }

    this._isDeserializing = false;

    const allCells = this._jointGraph.getCells();
    this._jointGraph.resetCells(allCells);
    await new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));

    this._jointGraph.getLinks().forEach(link => {
      const connection = this._connectionsByJointId.get(link.id);
      if (!connection) return;
      const savedConnectionData = connectionDataArray.find(data =>
        oldIdToNewShapeMap[data.sourceId]?._jointCell.id === connection.source._jointCell.id &&
        oldIdToNewShapeMap[data.targetId]?._jointCell.id === connection.target._jointCell.id
      );
      if (!savedConnectionData) return;
      if (savedConnectionData.sourcePort != null) link.set('sourcePort', savedConnectionData.sourcePort);
      if (savedConnectionData.targetPort != null) link.set('targetPort', savedConnectionData.targetPort);
    });

    this.emit('change');
    return this;
  }

  // ══════════════════════════════════════════════════════════════
  // Internal: mobile button visibility
  // ══════════════════════════════════════════════════════════════
  _updateMobileButtonVisibility() {
    if (!this._isMobileDevice()) return;
    const shouldHide = this._selectedItem !== null
      || !this._leftSidebarElement.classList.contains('wf-collapsed')
      || !this._rightSidebarElement.classList.contains('wf-collapsed');
    const displayValue = shouldHide ? 'none' : '';
    this._topRightButtonGroup.style.display  = displayValue;
    this._topLeftButtonGroup.style.display   = displayValue;
    this._bottomLeftButtonGroup.style.display = displayValue;
  }

  // ══════════════════════════════════════════════════════════════
  // Internal: DOM construction
  // ══════════════════════════════════════════════════════════════

    this._hostElement.innerHTML = '';
    this._hostElement.style.cssText = 'display:flex;height:100%;overflow:hidden;';

    // Left sidebar (shape library)
    this._leftSidebarElement = this._hostElement.appendChild(this._createElement('div', 'wf-sidebar wf-sidebar-left'));

    this._leftSidebarCollapseButton = leftSidebarHeader.querySelector('.wf-collapse-btn');
    this._leftSidebarCollapseIcon   = leftSidebarHeader.querySelector('.wf-collapse-icon');
    this._libraryPanelElement = this._leftSidebarElement.appendChild(this._createElement('div', 'wf-library wf-sidebar-body'));
    this._buildShapeLibraryItems();
