  // ══════════════════════════════════════════════════════════════
  // Internal: JointJS paper initialisation
  // ══════════════════════════════════════════════════════════════
  _initJointPaper() {
    this._jointGraph = new joint.dia.Graph({}, { cellNamespace: joint.shapes });
    this._jointPaper = new joint.dia.Paper({
      el: this._paperDOMElement,
      model: this._jointGraph,
      width: '100%', height: '100%',
      gridSize: this._gridSize,
      drawGrid: { name: 'dot', color: '#e9ecef' },
      background: { color: '#ffffff' },
      cellNamespace: joint.shapes,
      defaultConnector: { name: 'rounded' },
      defaultRouter: { name: 'manhattan', args: { step: this._gridSize, padding: 30, maxIter: 200 } },
      interactive: { linkMove: true, vertexAdd: true, vertexMove: true, elementMove: true },
      preventDefaultBlankAction: false,
      linkPinning: false,
      snapLinks: { radius: 25 },
      markAvailable: true,
      defaultLink: () => new joint.shapes.standard.Link({ attrs: { line: { stroke: '#495057', strokeWidth: 2, targetMarker: ARROW_MARKERS.classic } } }),
      validateConnection: (sourceView, sourceMagnet, targetView, targetMagnet) => sourceMagnet && targetMagnet && sourceView !== targetView
    });
  }

  // ══════════════════════════════════════════════════════════════
  // Internal: UI event handler binding
  // ══════════════════════════════════════════════════════════════
  _bindUIEventHandlers() {
    this._exportButton.addEventListener('click', () => {
      try {
        const jsonBlob = new Blob([this.serialize()], { type: 'application/json' });
        const downloadUrl = URL.createObjectURL(jsonBlob);
        const downloadLink = Object.assign(document.createElement('a'), { href: downloadUrl, download: 'diagram.json' });
        document.body.appendChild(downloadLink);
        downloadLink.click();
        document.body.removeChild(downloadLink);
        setTimeout(() => URL.revokeObjectURL(downloadUrl), 1000);
      } catch (error) { alert('Export failed: ' + error.message); }
    });

    this._importButton.addEventListener('click', () => this._importFileInputElement.click());
    this._importFileInputElement.addEventListener('change', event => {
      const selectedFile = event.target.files[0];
      if (!selectedFile) return;
      const fileReader = new FileReader();
      fileReader.onload = loadEvent => this.deserialize(loadEvent.target.result).catch(error => alert('Import failed: ' + error.message));
      fileReader.readAsText(selectedFile);
      event.target.value = '';
    });

    this._leftSidebarCollapseButton.addEventListener('click',  () => this._toggleSidebarCollapsed(this._leftSidebarElement));
    this._rightSidebarCollapseButton.addEventListener('click', () => this._toggleSidebarCollapsed(this._rightSidebarElement));
    this._autoPortToggleButton.addEventListener('click', () => this.setAutoPortSwitching(!this._autoPortEnabled));
    this._autoArrangeButton.addEventListener('click',   () => this.autoArrange());
    this._zoomToFitButton.addEventListener('click',    () => this.zoomToFit());
    this._zoomResetButton.addEventListener('click',    () => this.zoomReset());
    this._zoomInButton.addEventListener('click',       () => this.zoomIn());
    this._zoomOutButton.addEventListener('click',      () => this.zoomOut());
    this._centerContentButton.addEventListener('click', () => this.centerContent());

    this._jointPaper.el.addEventListener('wheel', event => {
      event.preventDefault();
      if (event.ctrlKey) this._zoomAroundPoint(Math.exp(-event.deltaY * 0.0015), event.clientX, event.clientY);
      else { const translation = this._jointPaper.translate(); this._jointPaper.translate(translation.tx - event.deltaX, translation.ty - event.deltaY); }
    }, { passive: false });

    this._contextMenuElement.addEventListener('click', event => {
      const action = event.target.closest('[data-action]')?.dataset.action;
      if (action === 'duplicate') this._duplicateSelectedShape();
      if (action === 'delete')    this._deleteSelectedItem();
      this._contextMenuElement.style.display = 'none';
    });
    window.addEventListener('click', event => { if (!event.target.closest('.wf-context-menu')) this._contextMenuElement.style.display = 'none'; });

    this._propertiesPanelHeaderActions.addEventListener('click', event => {
      const action = event.target.closest('[data-action]')?.dataset.action;
      if (!action) return;
      if (action === 'focus')     this._focusCameraOnSelected();
      if (action === 'duplicate') { this._duplicateSelectedShape(); if (this._isMobileDevice()) this._toggleSidebarCollapsed(this._rightSidebarElement); }
      if (action === 'delete')    { this._deleteSelectedItem();    if (this._isMobileDevice()) this._toggleSidebarCollapsed(this._rightSidebarElement); }
    });

    this._elementPropertiesPanel.addEventListener('input',  event => this._handleElementPropertyInput(event));
    this._elementPropertiesPanel.addEventListener('change', event => this._handleElementPropertyInput(event));
    this._connectionPropertiesPanel.addEventListener('input',  event => this._handleConnectionPropertyInput(event));
    this._connectionPropertiesPanel.addEventListener('change', event => this._handleConnectionPropertyInput(event));

    this._canvasContainerElement.addEventListener('dragover', event => event.preventDefault());
    this._canvasContainerElement.addEventListener('drop', event => {
      event.preventDefault();
      const customShapeLabel = event.dataTransfer.getData('customShape');
      if (customShapeLabel && this._registeredCustomShapes?.[customShapeLabel]) {
        const dropPosition = this._jointPaper.clientToLocalPoint({ x: event.clientX, y: event.clientY });
        const ShapeClass = this._registeredCustomShapes[customShapeLabel];
        const newShape = new ShapeClass();
        const clearPosition = this._findNearestClearPosition(dropPosition.x - 70, dropPosition.y - 25, 140, 50);
        const jointCell = newShape._buildJointCell(clearPosition, joint.shapes);
        jointCell.attr('label/text', newShape._label);
        newShape._jointCell = jointCell;
        newShape._parentCanvas = this;
        Object.entries(newShape._customPropertyValues).forEach(([key, value]) => jointCell.set(`custom_${key}`, value));
        jointCell.addTo(this._jointGraph);
        this._shapesByJointId.set(jointCell.id, newShape);
        this._deselectAll();
        (async () => {
          await this._waitForCellToRender(jointCell);
          await this._autoResizeCellAsync(jointCell);
          if (newShape._renderFunction) newShape._renderFunction(newShape);
          await this._waitForCellToRender(jointCell);
          newShape.on('change', updatedShape => this.emit('shape:change', updatedShape));
          newShape.on('move',   movedShape   => this.emit('shape:move',   movedShape));
          this._selectCellOrConnection(newShape);
        })();
        this.emit('shape:add', newShape);
        return;
      }

      const droppedShapeType = event.dataTransfer.getData('type');
      const builtInShapeDefinitions = [
        { type: 'rect',     cls: Rectangle }, { type: 'square',   cls: Square   }, { type: 'ellipse',  cls: Ellipse  },
        { type: 'circle',   cls: Circle    }, { type: 'diamond',  cls: Diamond  }, { type: 'triangle', cls: Triangle },
        { type: 'hexagon',  cls: Hexagon   }, { type: 'pentagon', cls: Pentagon }, { type: 'octagon',  cls: Octagon  }
      ];
      const matchedDefinition = builtInShapeDefinitions.find(def => def.type === droppedShapeType);
      if (!matchedDefinition) return;

      const displayLabel = droppedShapeType.charAt(0).toUpperCase() + droppedShapeType.slice(1);
      const dropPosition = this._jointPaper.clientToLocalPoint({ x: event.clientX, y: event.clientY });
      const newShape = new matchedDefinition.cls(displayLabel.toUpperCase());
      const isSquarish = ['square', 'circle', 'diamond'].includes(droppedShapeType);
      const initialWidth  = isSquarish ? 80 : 140;
      const initialHeight = isSquarish ? 80 : 50;
      const clearPosition = this._findNearestClearPosition(dropPosition.x - initialWidth / 2, dropPosition.y - initialHeight / 2, initialWidth, initialHeight);
      const jointCell = newShape._buildJointCell(clearPosition, joint.shapes);
      jointCell.attr('label/text', newShape._label);
      newShape._jointCell = jointCell;
      newShape._parentCanvas = this;
      jointCell.addTo(this._jointGraph);
      this._shapesByJointId.set(jointCell.id, newShape);
      this._deselectAll();
      (async () => {
        await this._waitForCellToRender(jointCell);
        await this._autoResizeCellAsync(jointCell);
        await this._waitForCellToRender(jointCell);
        newShape.on('change', updatedShape => this.emit('shape:change', updatedShape));
        newShape.on('move',   movedShape   => this.emit('shape:move',   movedShape));
        this._selectCellOrConnection(newShape);
      })();
      this.emit('shape:add', newShape);
    });

    this._elementPropertiesPanel.querySelector('[data-action="upload-image"]').addEventListener('click', () => {
      this._elementPropertiesPanel.querySelector('[data-action="image-file"]').click();
    });
    this._elementPropertiesPanel.querySelector('[data-action="image-file"]').addEventListener('change', event => {
      const selectedFile = event.target.files[0];
      if (!selectedFile) return;
      const fileReader = new FileReader();
      fileReader.onload = loadEvent => {
        this._elementPropertiesPanel.querySelector('[data-prop="imageUrl"]').value = loadEvent.target.result;
        if (this._selectedItem instanceof Shape) this._selectedItem.imageUrl = loadEvent.target.result;
      };
      fileReader.readAsDataURL(selectedFile);
    });
  }

  _handleElementPropertyInput(event) {
    if (!(this._selectedItem instanceof Shape)) return;
    const inputElement = event.target.closest('[data-prop]');
    if (!inputElement) return;
    const propName = inputElement.dataset.prop;
    const propValue = inputElement.type === 'number' ? parseFloat(inputElement.value) : inputElement.value;
    if (inputElement.dataset.pair)       this._elementPropertiesPanel.querySelector(`[data-prop="${inputElement.dataset.pair}"]`).value = propValue;
    if (inputElement.dataset.pairPicker) this._elementPropertiesPanel.querySelector(`[data-prop="${inputElement.dataset.pairPicker}"]`).value = propValue;
    const resolvedPropName = propName.endsWith('Hex') ? propName.slice(0, -3) : propName;
    if (resolvedPropName in this._selectedItem) this._selectedItem[resolvedPropName] = propValue;
  }

  _handleConnectionPropertyInput(event) {
    if (!(this._selectedItem instanceof Connection)) return;
    const inputElement = event.target.closest('[data-prop]');
    if (!inputElement) return;
    const propName = inputElement.dataset.prop;
    const propValue = inputElement.type === 'number' ? parseFloat(inputElement.value) : inputElement.value;
    if (inputElement.dataset.pair)       this._connectionPropertiesPanel.querySelector(`[data-prop="${inputElement.dataset.pair}"]`).value = propValue;
    if (inputElement.dataset.pairPicker) this._connectionPropertiesPanel.querySelector(`[data-prop="${inputElement.dataset.pairPicker}"]`).value = propValue;
    const resolvedPropName = propName.endsWith('Hex') ? propName.slice(0, -3) : propName;
    if (resolvedPropName in this._selectedItem) this._selectedItem[resolvedPropName] = propValue;
  }

  // ══════════════════════════════════════════════════════════════
  // Internal: JointJS paper event handler binding
  // ══════════════════════════════════════════════════════════════
  _bindJointPaperEventHandlers() {
    const CustomSourceArrowhead = joint.linkTools.SourceArrowhead.extend({
      tagName: 'circle',
      attributes: { r: 6, fill: '#3498db', stroke: '#fff', 'stroke-width': 2, cursor: 'move' }
    });

    this._jointPaper.on('element:pointerdown', (cellView, pointerEvent) => {
      const shape = this._shapesByJointId.get(cellView.model.id);
      if (!shape) return;
      this._pointerDownPosition = { x: pointerEvent.clientX, y: pointerEvent.clientY };
      this._wasShapeAlreadySelected = this._selectedItem === shape;
      this._deselectAll();
      if (!this._isMobileDevice()) shape._jointCell.toFront();
      this._selectCellOrConnection(shape);
    });

    this._jointPaper.on('element:pointerup', (cellView, pointerEvent) => {
      const distanceX = Math.abs(pointerEvent.clientX - (this._pointerDownPosition?.x ?? pointerEvent.clientX));
      const distanceY = Math.abs(pointerEvent.clientY - (this._pointerDownPosition?.y ?? pointerEvent.clientY));
      if (distanceX < 5 && distanceY < 5 && this._wasShapeAlreadySelected && this._rightSidebarElement.classList.contains('wf-collapsed')) {
        this._toggleSidebarCollapsed(this._rightSidebarElement);
      }
      this._pointerDownPosition = null;
      this._wasShapeAlreadySelected = false;
      if (!this._isMobileDevice()) {
        const shape = this._shapesByJointId.get(cellView.model.id);
        if (shape) {
          const shapeBoundingBox = shape._jointCell.getBBox();
          const clearPosition = this._findNearestClearPosition(shapeBoundingBox.x, shapeBoundingBox.y, shapeBoundingBox.width, shapeBoundingBox.height, shape._jointCell);
          shape._jointCell.position(clearPosition.x, clearPosition.y);
        }
      }
    });

    this._jointPaper.on('link:pointerdown', linkView => {
      const connection = this._connectionsByJointId.get(linkView.model.id);
      if (!connection) return;
      this._deselectAll();
      linkView.model.toFront();
      this._selectCellOrConnection(connection);
      linkView.addTools(new joint.dia.ToolsView({ tools: [
        new joint.linkTools.Vertices(),
        new CustomSourceArrowhead(),
        new joint.linkTools.TargetArrowhead({ offset: -1 }),
        new joint.linkTools.Remove({ distance: 20 })
      ]}));
    });

    this._jointPaper.on('cell:pointerdown tool:pointerdown', (view, event) => {
      if (event?.target?.closest?.('.joint-port')) this._jointPaper.el.classList.add('wf-dragging-link');
    });
    this._jointPaper.on('cell:pointerup link:pointerup tool:pointerup', () => {
      this._jointPaper.el.classList.remove('wf-dragging-link');
    });

    this._jointPaper.on('cell:contextmenu', (cellView, event) => {
      event.preventDefault();
      const containerRect = this._canvasContainerElement.getBoundingClientRect();
      this._contextMenuElement.style.display = 'block';
      this._contextMenuElement.style.left = (event.clientX - containerRect.left) + 'px';
      this._contextMenuElement.style.top  = (event.clientY - containerRect.top)  + 'px';
      this._contextMenuElement.querySelector('[data-action="duplicate"]').style.display = this._shapesByJointId.has(cellView.model.id) ? 'flex' : 'none';
    });

    this._jointPaper.on('blank:pointerdown', pointerEvent => {
      this._collapseAllSidebarsOnMobile();
      const startX = pointerEvent.clientX, startY = pointerEvent.clientY;
      const initialTranslation = this._jointPaper.translate();
      if (this._isMobileDevice()) {
        this._deselectAll();
        return;
      }
      const onMouseMove = moveEvent => this._jointPaper.translate(initialTranslation.tx + (moveEvent.clientX - startX), initialTranslation.ty + (moveEvent.clientY - startY));
      const onMouseUp   = upEvent => {
        document.removeEventListener('mousemove', onMouseMove);
        document.removeEventListener('mouseup',   onMouseUp);
        const distanceX = Math.abs(upEvent.clientX - startX);
        const distanceY = Math.abs(upEvent.clientY - startY);
        if (distanceX < 5 && distanceY < 5) this._deselectAll();
      };
      document.addEventListener('mousemove', onMouseMove);
      document.addEventListener('mouseup',   onMouseUp);
    });

    this._jointPaper.on('link:connect', linkView => {
      const link = linkView.model;
      const sourceElement = link.getSourceElement();
      const targetElement = link.getTargetElement();
      if (!sourceElement || !targetElement) return;
      const sourceShape = this._shapesByJointId.get(sourceElement.id);
      const targetShape = this._shapesByJointId.get(targetElement.id);
      if (!sourceShape || !targetShape || this._connectionsByJointId.has(link.id)) return;
      const reverseConnectionExists = [...this._connectionsByJointId.values()].some(conn => conn.source === targetShape && conn.target === sourceShape);
      if (reverseConnectionExists) { link.remove(); return; }
      const newConnection = new Connection(link, sourceShape, targetShape, this);
      this._connectionsByJointId.set(link.id, newConnection);
      newConnection.on('change', updatedConnection => this.emit('connection:change', updatedConnection));
      this.emit('connection:add', newConnection);
    });

    this._jointGraph.on('remove', removedCell => {
      if (removedCell.isLink()) {
        const connection = this._connectionsByJointId.get(removedCell.id);
        if (connection) { this._connectionsByJointId.delete(removedCell.id); this.emit('connection:remove', connection); }
      } else {
        const shape = this._shapesByJointId.get(removedCell.id);
        if (shape) { this._shapesByJointId.delete(removedCell.id); this.emit('shape:remove', shape); }
      }
    });

    this._jointGraph.on('change:position', changedCell => {
      const shape = this._shapesByJointId.get(changedCell.id);
      if (shape) { this._redistributePortsForElement(changedCell); shape.emit('move', shape); }
    });
  }

  // ══════════════════════════════════════════════════════════════
  // Internal: keyboard shortcut binding
  // ══════════════════════════════════════════════════════════════
  _bindKeyboardShortcuts() {
    this._clipboardShape = null;
    this._canvasContainerElement.tabIndex = 0;
    this._canvasContainerElement.style.outline = 'none';
    this._canvasContainerElement.focus();

    this._canvasContainerElement.addEventListener('mousedown', () => {
      const activeTag = document.activeElement?.tagName;
      if (activeTag !== 'INPUT' && activeTag !== 'TEXTAREA') this._canvasContainerElement.focus();
    });

    this._canvasContainerElement.addEventListener('keydown', async event => {
      const activeTag = document.activeElement?.tagName;
      const isTypingInInput = activeTag === 'INPUT' || activeTag === 'TEXTAREA' || activeTag === 'SELECT';

      if (event.key === 'F2' || (!isTypingInInput && event.key === 'Enter')) {
        if (this._selectedItem instanceof Shape || this._selectedItem instanceof Connection) {
          event.preventDefault();
          if (this._rightSidebarElement.classList.contains('wf-collapsed')) this._toggleSidebarCollapsed(this._rightSidebarElement);
          await this._waitForCellToRender(this._selectedItem._jointCell ?? this._selectedItem._jointLink);
          const propertiesPanel = this._selectedItem instanceof Shape ? this._elementPropertiesPanel : this._connectionPropertiesPanel;
          const labelInput = propertiesPanel.querySelector('[data-prop="label"]');
          if (labelInput) { labelInput.focus(); labelInput.select(); }
        }
        return;
      }

      if (isTypingInInput) return;
      if (event.key === 'Escape')                               { event.preventDefault(); this._deselectAll(); return; }
      if (event.key === 'Delete' || event.key === 'Backspace')  { event.preventDefault(); this._deleteSelectedItem(); return; }
      if (event.key === '-' && !event.ctrlKey && !event.metaKey){ event.preventDefault(); this.zoomOut(); return; }
      if ((event.key === '=' || event.key === '+') && !event.ctrlKey && !event.metaKey) { event.preventDefault(); this.zoomIn(); return; }

      if ((event.ctrlKey || event.metaKey) && event.key === 'c') {
        if (this._selectedItem instanceof Shape) { event.preventDefault(); this._clipboardShape = this._selectedItem; }
        return;
      }
      if ((event.ctrlKey || event.metaKey) && event.key === 'v') {
        if (this._clipboardShape) {
          event.preventDefault();
          const clipboardBBox = this._clipboardShape._jointCell.getBBox();
          const pastePosition  = this._findNearestClearPosition(clipboardBBox.x + 40, clipboardBBox.y + 40, clipboardBBox.width, clipboardBBox.height);
          const clonedCell = this._clipboardShape._jointCell.clone();
          clonedCell.position(pastePosition.x, pastePosition.y);
          clonedCell.addTo(this._jointGraph);
          this._deselectAll();
          const clonedShape = new this._clipboardShape.constructor(this._clipboardShape.label);
          clonedShape._jointCell    = clonedCell;
          clonedShape._parentCanvas = this;
          this._shapesByJointId.set(clonedCell.id, clonedShape);
          (async () => {
            await this._waitForCellToRender(clonedCell);
            await this._autoResizeCellAsync(clonedCell);
            await this._waitForCellToRender(clonedCell);
            clonedShape.on('change', s => this.emit('shape:change', s));
            clonedShape.on('move',   s => this.emit('shape:move',   s));
            this._selectCellOrConnection(clonedShape);
          })();
          this.emit('shape:add', clonedShape);
        }
        return;
      }

      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(event.key)) {
        event.preventDefault();
        const deltaX = event.key === 'ArrowLeft' ? -this._gridSize : event.key === 'ArrowRight' ? this._gridSize : 0;
        const deltaY = event.key === 'ArrowUp'   ? -this._gridSize : event.key === 'ArrowDown'  ? this._gridSize : 0;
        if (this._selectedItem instanceof Shape) {
          this._selectedItem.moveBy(deltaX, deltaY);
        } else if (!this._selectedItem) {
          const currentTranslation = this._jointPaper.translate();
          this._jointPaper.translate(currentTranslation.tx - deltaX, currentTranslation.ty - deltaY);
        }
      }
    });
  }

  // ══════════════════════════════════════════════════════════════
  // Internal: touch gesture binding (mobile pan/pinch)
  // ══════════════════════════════════════════════════════════════
  _bindTouchGestureHandlers() {
    this._jointPaper.el.addEventListener('touchstart', event => {
      if (!this._isMobileDevice()) return;
      if (event.touches.length === 1) {
        const touch = event.touches[0];
        if (document.elementFromPoint(touch.clientX, touch.clientY)?.closest('.joint-cell')) return;
        event.stopPropagation();
        this._touchGestureState = { type: 'pan', startX: touch.clientX, startY: touch.clientY, initialTranslation: this._jointPaper.translate() };
      } else if (event.touches.length === 2) {
        event.stopPropagation();
        const [touch1, touch2] = [event.touches[0], event.touches[1]];
        this._touchGestureState = {
          type: 'pinch',
          initialDistance:    this._getTouchDistance(touch1, touch2),
          initialMidpoint:    this._getTouchMidpoint(touch1, touch2),
          initialScale:       this._jointPaper.scale().sx,
          initialTranslation: this._jointPaper.translate()
        };
      }
    }, { passive: true });

    this._jointPaper.el.addEventListener('touchmove', event => {
      if (!this._isMobileDevice() || !this._touchGestureState) return;
      event.preventDefault();
      const gestureState = this._touchGestureState;

      if (gestureState.type === 'pan' && event.touches.length === 1) {
        const touch = event.touches[0];
        this._jointPaper.translate(
          gestureState.initialTranslation.tx + (touch.clientX - gestureState.startX),
          gestureState.initialTranslation.ty + (touch.clientY - gestureState.startY)
        );
      } else if (gestureState.type === 'pinch' && event.touches.length === 2) {
        const [touch1, touch2] = [event.touches[0], event.touches[1]];
        const newScale = Math.max(0.1, Math.min(10, gestureState.initialScale * this._getTouchDistance(touch1, touch2) / gestureState.initialDistance));
        const midpoint = this._getTouchMidpoint(touch1, touch2);
        const paperRect = this._jointPaper.el.getBoundingClientRect();
        const viewportX = midpoint.x - paperRect.left;
        const viewportY = midpoint.y - paperRect.top;
        const originX = (viewportX - gestureState.initialTranslation.tx) / gestureState.initialScale;
        const originY = (viewportY - gestureState.initialTranslation.ty) / gestureState.initialScale;
        this._jointPaper.scale(newScale, newScale);
        this._jointPaper.translate(viewportX - originX * newScale, viewportY - originY * newScale);
      }
    }, { passive: false });

    this._jointPaper.el.addEventListener('touchend', event => {
      if (!this._isMobileDevice()) return;
      if (this._touchGestureState?.type === 'pinch' && event.touches.length === 1) {
        const touch = event.touches[0];
        this._touchGestureState = { type: 'pan', startX: touch.clientX, startY: touch.clientY, initialTranslation: this._jointPaper.translate() };
      } else {
        this._touchGestureState = null;
      }
    }, { passive: true });
  }

  // ══════════════════════════════════════════════════════════════
  // Internal: selection management
  // ══════════════════════════════════════════════════════════════
  _selectCellOrConnection(shapeOrConnection) {
    this._selectedItem = shapeOrConnection;
    const isShape = shapeOrConnection instanceof Shape;
    const jointModel = isShape ? shapeOrConnection._jointCell : shapeOrConnection._jointLink;
    const cellView = this._jointPaper.findViewByModel(jointModel);

    if (cellView) {
      cellView.el.classList.add('wf-selected');
      joint.highlighters.stroke.add(cellView, 'root', 'selection', { padding: 5, attrs: { stroke: '#3498db', 'stroke-width': 3 } });
    }

    this._propertiesPanelHeaderActions.style.display = 'flex';
    this._propertiesPanelHeaderActions.querySelector('[data-action="duplicate"]').style.display = isShape ? 'flex' : 'none';

    if (isShape) { this._showPropertiesPanel('element');    this._populateElementPropertiesPanel(shapeOrConnection); }
    else         { this._showPropertiesPanel('connection'); this._populateConnectionPropertiesPanel(shapeOrConnection); }

    this.emit('selection:change', shapeOrConnection);
    this._updateMobileButtonVisibility();
  }

  _deselectAll() {
    if (this._selectedItem) {
      const jointModel = this._selectedItem instanceof Shape ? this._selectedItem._jointCell : this._selectedItem._jointLink;
      this._jointPaper.findViewByModel(jointModel)?.el.classList.remove('wf-selected');
    }
    this._jointPaper.removeTools();
    joint.highlighters.stroke.removeAll(this._jointPaper);
    this._selectedItem = null;
    this._propertiesPanelHeaderActions.style.display = 'none';
    this._showPropertiesPanel('none');
    this.emit('selection:change', null);
    this._canvasContainerElement.focus();
    this._updateMobileButtonVisibility();
  }

  _showPropertiesPanel(panelType) {
    this._elementPropertiesPanel.style.display    = panelType === 'element'    ? 'flex' : 'none';
    this._connectionPropertiesPanel.style.display = panelType === 'connection' ? 'flex' : 'none';
    this._noSelectionMessageElement.style.display = panelType === 'none'       ? 'block' : 'none';
  }

  _populateElementPropertiesPanel(shape) {
    const panel = this._elementPropertiesPanel;
    const setFieldValue = (propName, value) => { const el = panel.querySelector(`[data-prop="${propName}"]`); if (el) el.value = value ?? ''; };

    setFieldValue('label',            shape.label);
    setFieldValue('labelFontSize',    shape.labelFontSize);
    setFieldValue('description',      shape.description);
    setFieldValue('imageUrl',         shape.imageUrl);
    setFieldValue('imageWidth',       shape.imageWidth);
    setFieldValue('imageHeight',      shape.imageHeight);
    setFieldValue('backgroundColor',  shape.backgroundColor);
    setFieldValue('backgroundColorHex', shape.backgroundColor);
    setFieldValue('borderColor',      shape.borderColor);
    setFieldValue('borderColorHex',   shape.borderColor);
    setFieldValue('labelColor',       shape.labelColor);
    setFieldValue('labelColorHex',    shape.labelColor);
    setFieldValue('descriptionColor', shape.descriptionColor);
    setFieldValue('descriptionColorHex', shape.descriptionColor);

    panel.querySelector('.wf-custom-props')?.remove();
    const schema = shape.getSchema?.() ?? {};
    if (!Object.keys(schema).length) return;

    const customPropsSection = this._createElement('div', 'wf-custom-props');
    const divider = customPropsSection.appendChild(this._createElement('div'));
    divider.style.cssText = 'border-top:1px solid #dee2e6;margin:4px 0;';

    Object.entries(schema).forEach(([propertyKey, propertyDefinition]) => {
      if (propertyDefinition.visible === false) return;

      const propertyGroup = customPropsSection.appendChild(this._createElement('div', 'wf-prop-group'));
      const propertyLabel = propertyGroup.appendChild(this._createElement('label'));
      propertyLabel.textContent = propertyDefinition.label ?? propertyKey;

      const currentValue = shape.getCustomProperty(propertyKey);
      let inputElement;

      if (propertyDefinition.type === 'choice') {
        inputElement = this._createElement('select');
        Object.entries(propertyDefinition.choices ?? {}).forEach(([choiceValue, choiceLabel]) => {
          const optionEl = inputElement.appendChild(this._createElement('option'));
          optionEl.value = choiceValue;
          optionEl.textContent = choiceLabel;
        });
        inputElement.value = currentValue ?? propertyDefinition.default;

      } else if (propertyDefinition.type === 'textarea') {
        inputElement = this._createElement('textarea');
        inputElement.value = currentValue ?? '';

      } else if (propertyDefinition.type === 'boolean') {
        inputElement = this._createElement('input');
        inputElement.type = 'checkbox';
        inputElement.checked = currentValue ?? propertyDefinition.default ?? false;
        inputElement.style.cssText = 'width:auto !important;margin:0;cursor:pointer;align-self:flex-start;';
        propertyGroup.appendChild(inputElement);

      } else if (propertyDefinition.type === 'color') {
        const colorRow = propertyGroup.appendChild(this._createElement('div', 'wf-color-row'));
        const colorPicker = this._createElement('input'); colorPicker.type = 'color'; colorPicker.value = currentValue ?? propertyDefinition.default ?? '#000000';
        const hexInput    = this._createElement('input'); hexInput.type    = 'text';  hexInput.value    = currentValue ?? propertyDefinition.default ?? '#000000';
        colorPicker.addEventListener('input', () => { hexInput.value = colorPicker.value; shape.setCustomProperty(propertyKey, colorPicker.value); });
        hexInput.addEventListener('input',    () => { colorPicker.value = hexInput.value; shape.setCustomProperty(propertyKey, hexInput.value); });
        colorRow.appendChild(colorPicker);
        colorRow.appendChild(hexInput);
        propertyGroup.appendChild(colorRow);
        return;

      } else {
        inputElement = this._createElement('input');
        inputElement.type  = propertyDefinition.type === 'number' ? 'number' : 'text';
        inputElement.value = currentValue ?? '';
        if (propertyDefinition.min !== undefined) inputElement.min = propertyDefinition.min;
        if (propertyDefinition.max !== undefined) inputElement.max = propertyDefinition.max;
      }

      if (propertyDefinition.readonly) inputElement.disabled = true;
      propertyGroup.appendChild(inputElement);

      inputElement.addEventListener(propertyDefinition.type === 'boolean' ? 'change' : 'input', () => {
        const newValue = propertyDefinition.type === 'boolean' ? inputElement.checked
          : propertyDefinition.type === 'number' ? parseFloat(inputElement.value)
          : inputElement.value;
        shape.setCustomProperty(propertyKey, newValue);
      });
    });

    panel.appendChild(customPropsSection);
  }

  _populateConnectionPropertiesPanel(connection) {
    const panel = this._connectionPropertiesPanel;
    const setFieldValue = (propName, value) => { const el = panel.querySelector(`[data-prop="${propName}"]`); if (el) el.value = value ?? ''; };

    setFieldValue('label',         connection.label);
    setFieldValue('labelFontSize', connection.labelFontSize);
    setFieldValue('labelColor',    connection.labelColor);
    setFieldValue('labelColorHex', connection.labelColor);
    setFieldValue('lineColor',     connection.lineColor);
    setFieldValue('lineColorHex',  connection.lineColor);
    setFieldValue('lineStyle',     connection.lineStyle);
    setFieldValue('connectorType', connection.connectorType);
    setFieldValue('sourceArrow',   connection.sourceArrow);
    setFieldValue('targetArrow',   connection.targetArrow);
    setFieldValue('description',   connection.description);
  }

  // ══════════════════════════════════════════════════════════════
  // Internal: sidebar collapse/expand
  // ══════════════════════════════════════════════════════════════
  _toggleSidebarCollapsed(sidebarElement) {
    const isLeftSidebar = sidebarElement === this._leftSidebarElement;
    const collapseIcon  = isLeftSidebar ? this._leftSidebarCollapseIcon : this._rightSidebarCollapseIcon;
    const previousTranslation = this._jointPaper.translate();
    const isNowCollapsed = sidebarElement.classList.toggle('wf-collapsed');

    collapseIcon.style.transform = isNowCollapsed ? 'rotate(180deg)' : 'rotate(0deg)';
    sidebarElement.querySelector('.wf-collapsed-label').style.display = isNowCollapsed ? 'block' : 'none';

    if (this._isMobileDevice() && !isNowCollapsed) {
      const otherSidebar   = isLeftSidebar ? this._rightSidebarElement : this._leftSidebarElement;
      const otherCollapseIcon = isLeftSidebar ? this._rightSidebarCollapseIcon : this._leftSidebarCollapseIcon;
      if (!otherSidebar.classList.contains('wf-collapsed')) {
        otherSidebar.classList.add('wf-collapsed');
        otherCollapseIcon.style.transform = 'rotate(180deg)';
        otherSidebar.querySelector('.wf-collapsed-label').style.display = 'block';
      }
    }

    const resizeInterval = setInterval(() => {
      const container = this._canvasContainerElement;
      this._jointPaper.setDimensions(container.clientWidth, container.clientHeight);
      this._jointPaper.translate(previousTranslation.tx, previousTranslation.ty);
    }, 16);
    setTimeout(() => clearInterval(resizeInterval), 350);
    this._updateMobileButtonVisibility();
  }

  _setSidebarCollapsedState(sidebarElement, shouldBeCollapsed) {
    const isLeftSidebar = sidebarElement === this._leftSidebarElement;
    const collapseIcon  = isLeftSidebar ? this._leftSidebarCollapseIcon : this._rightSidebarCollapseIcon;
    sidebarElement.classList.toggle('wf-collapsed', shouldBeCollapsed);
    collapseIcon.style.transform = shouldBeCollapsed ? 'rotate(180deg)' : 'rotate(0deg)';
    sidebarElement.querySelector('.wf-collapsed-label').style.display = shouldBeCollapsed ? 'block' : 'none';
  }

  _collapseAllSidebarsOnMobile() {
    if (!this._isMobileDevice()) return;
    const previousTranslation = this._jointPaper.translate();
    this._setSidebarCollapsedState(this._leftSidebarElement, true);
    this._setSidebarCollapsedState(this._rightSidebarElement, true);
    const resizeInterval = setInterval(() => {
      const container = this._canvasContainerElement;
      this._jointPaper.setDimensions(container.clientWidth, container.clientHeight);
      this._jointPaper.translate(previousTranslation.tx, previousTranslation.ty);
    }, 16);
    setTimeout(() => clearInterval(resizeInterval), 350);
    this._updateMobileButtonVisibility();
  }

  // ══════════════════════════════════════════════════════════════
  // Internal: shape/connection actions
  // ══════════════════════════════════════════════════════════════
  _duplicateSelectedShape() {
    if (!(this._selectedItem instanceof Shape)) return;
    const originalBBox  = this._selectedItem._jointCell.getBBox();
    const pastePosition = this._findNearestClearPosition(originalBBox.x + 40, originalBBox.y + 40, originalBBox.width, originalBBox.height);
    const clonedCell = this._selectedItem._jointCell.clone();
    clonedCell.translate(pastePosition.x - originalBBox.x, pastePosition.y - originalBBox.y);
    clonedCell.addTo(this._jointGraph);
    const clonedShape = new this._selectedItem.constructor(this._selectedItem.label);
    clonedShape._jointCell    = clonedCell;
    clonedShape._parentCanvas = this;
    this._shapesByJointId.set(clonedCell.id, clonedShape);
    this._selectCellOrConnection(clonedShape);
    this.emit('shape:add', clonedShape);
  }

  _deleteSelectedItem() {
    if (!this._selectedItem) return;
    const itemToDelete = this._selectedItem;
    this._deselectAll();
    itemToDelete.remove();
  }

  _focusCameraOnSelected() {
    if (!this._selectedItem) return;
    const jointModel = this._selectedItem instanceof Shape ? this._selectedItem._jointCell : this._selectedItem._jointLink;
    const centerPoint = jointModel.getBBox().center();
    const paperSize   = this._jointPaper.getComputedSize();
    this._jointPaper.scale(1, 1);
    this._jointPaper.translate(paperSize.width / 2 - centerPoint.x, paperSize.height / 2 - centerPoint.y);
  }

  // ══════════════════════════════════════════════════════════════
  // Internal: connection creation
  // ══════════════════════════════════════════════════════════════
  _createConnection(sourceShape, targetShape, sourcePortIndex, targetPortIndex) {
    const reverseConnectionExists = [...this._connectionsByJointId.values()].some(
      conn => conn.source === targetShape && conn.target === sourceShape
    );
    if (reverseConnectionExists) return null;

    const newLink = new joint.shapes.standard.Link({
      attrs: { line: { stroke: '#495057', strokeWidth: 2, targetMarker: ARROW_MARKERS.classic } }
    });

    const sourcePorts = sourceShape._jointCell.getPorts();
    const targetPorts = targetShape._jointCell.getPorts();
    const sourcePortDefinition = sourcePortIndex !== null ? sourcePorts[sourcePortIndex - 1] : null;
    const targetPortDefinition = targetPortIndex !== null ? targetPorts[targetPortIndex - 1] : null;
    const sourcePortId = sourcePortDefinition ? sourcePortDefinition.id : undefined;
    const targetPortId = targetPortDefinition ? targetPortDefinition.id : undefined;

    newLink.source(sourcePortId ? { id: sourceShape._jointCell.id, port: sourcePortId } : { id: sourceShape._jointCell.id });
    newLink.target(targetPortId ? { id: targetShape._jointCell.id, port: targetPortId } : { id: targetShape._jointCell.id });

    if (sourcePortIndex !== null) newLink.set('sourcePort', sourcePortIndex);
    if (targetPortIndex !== null) newLink.set('targetPort', targetPortIndex);

    this._jointGraph.startBatch('connection');
    newLink.addTo(this._jointGraph);
    this._jointGraph.stopBatch('connection');
    this._jointPaper.updateViews();

    const newConnection = new Connection(newLink, sourceShape, targetShape, this);
    this._connectionsByJointId.set(newLink.id, newConnection);
    newConnection.on('change', updatedConnection => this.emit('connection:change', updatedConnection));
    this.emit('connection:add', newConnection);
    return newConnection;
  }

  _getConnectionsForShape(shape) {
    return [...this._connectionsByJointId.values()].filter(conn => conn.source === shape || conn.target === shape);
  }

  // ══════════════════════════════════════════════════════════════
  // Internal: auto port distribution
  // ══════════════════════════════════════════════════════════════
  _redistributePortsForElement(jointElement) {
    if (!this._autoPortEnabled || this._isDeserializing) return;

    this._jointGraph.getConnectedLinks(jointElement).forEach(link => {
      if (typeof link.get('sourcePort') === 'number') return;
      if (typeof link.get('targetPort') === 'number') return;

      const sourceElement = link.getSourceElement();
      const targetElement = link.getTargetElement();
      if (!sourceElement || !targetElement) return;

      const getElementCenter = element => {
        const position = element.position();
        const size     = element.size();
        return { x: position.x + size.width / 2, y: position.y + size.height / 2 };
      };

      const getBestPortForDirection = (element, directionTargetCenter) => {
        const elementCenter = getElementCenter(element);
        const angleToTarget = Math.atan2(directionTargetCenter.y - elementCenter.y, directionTargetCenter.x - elementCenter.x);
        const portPositions = element.getPortsPositions('all');
        const elementSize   = element.size();
        let bestPortId = null, smallestAngleDelta = Infinity;

        element.getPorts().forEach(port => {
          const portPosition = portPositions[port.id];
          if (!portPosition) return;
          const portAngle = Math.atan2(portPosition.y - elementSize.height / 2, portPosition.x - elementSize.width / 2);
          let angleDelta = Math.abs(angleToTarget - portAngle);
          if (angleDelta > Math.PI) angleDelta = 2 * Math.PI - angleDelta;
          if (angleDelta < smallestAngleDelta) { smallestAngleDelta = angleDelta; bestPortId = port.id; }
        });
        return bestPortId;
      };

      const sourceCenter = getElementCenter(sourceElement);
      const targetCenter = getElementCenter(targetElement);
      const bestSourcePortId = getBestPortForDirection(sourceElement, targetCenter);
      const bestTargetPortId = getBestPortForDirection(targetElement, sourceCenter);

      if (link.source().port !== bestSourcePortId) { link.source({ id: sourceElement.id, port: bestSourcePortId }); link.unset('sourcePort'); }
      if (link.target().port !== bestTargetPortId) { link.target({ id: targetElement.id, port: bestTargetPortId }); link.unset('targetPort'); }
    });
  }

  // ══════════════════════════════════════════════════════════════
  // Internal: cell rendering helpers
  // ══════════════════════════════════════════════════════════════
  _waitForCellToRender(jointCell) {
    return new Promise(resolve => {
      const cellView = this._jointPaper.findViewByModel(jointCell);
      if (!cellView) { resolve(); return; }
      requestAnimationFrame(() => requestAnimationFrame(() => resolve(cellView)));
    });
  }

  async _autoResizeCellAsync(jointCell) {
    this._autoResizeCellToFitContent(jointCell);
    await this._waitForCellToRender(jointCell);
    this._jointPaper.updateViews();
  }

  _autoResizeCellToFitContent(jointCell) {
    const cellView = this._jointPaper.findViewByModel(jointCell);
    if (!cellView) return;

    const labelTextNode       = cellView.el.querySelector('.label');
    const descriptionTextNode = cellView.el.querySelector('.descriptionLabel');
    if (!labelTextNode || !descriptionTextNode) return;

    const fontSizeScale = (jointCell.get('fontSizePercent') || 100) / 100;
    jointCell.attr({ label: { fontSize: 13 * fontSizeScale }, descriptionLabel: { fontSize: 11 * fontSizeScale } });

    const imageUrl    = jointCell.get('imageUrl');
    const shapeType   = jointCell.get('type');
    const descText    = jointCell.attr('descriptionLabel/text') || '';
    const imageWidth  = parseInt(jointCell.get('imageWidth')  || 32);
    const imageHeight = parseInt(jointCell.get('imageHeight') || 32);
    const padding     = 15;
    const imageSpacing = imageUrl ? 10 : 0;

    const labelBBox = labelTextNode.getBBox();
    const descBBox  = descriptionTextNode.getBBox();
    const textWidth = Math.max(labelBBox.width, descBBox.width);
    const totalContentWidth = (imageUrl ? imageWidth : 0) + imageSpacing + textWidth;

    let newWidth  = Math.max(140, padding + totalContentWidth + padding);
    const totalTextHeight = descText ? labelBBox.height + descBBox.height : labelBBox.height;
    let newHeight = Math.max(50, padding + Math.max(imageUrl ? imageHeight : 0, totalTextHeight) + padding);

    if (shapeType === 'diamond' || shapeType === 'circle') {
      newWidth = newHeight = Math.max(newWidth, newHeight);
    } else if (['triangle', 'hexagon', 'pentagon', 'octagon'].includes(shapeType)) {
      if (newWidth / newHeight > 1.2) newHeight = newWidth / 1.2;
      else newWidth = newHeight * 1.2;
      if (shapeType === 'triangle') { newWidth *= 1.25; newHeight *= 1.25; }
    }

    const contentStartX = (newWidth - totalContentWidth) / 2;
    const textCenterX   = contentStartX + (imageUrl ? imageWidth : 0) + imageSpacing + textWidth / 2;

    jointCell.attr('image', { refX: 0, refX2: contentStartX, refY: 0.5, y: -imageHeight / 2, width: imageWidth, height: imageHeight });

    if (descText) {
      const contentStartY = (newHeight - totalTextHeight) / 2;
      jointCell.attr('label',            { refX: 0, refX2: textCenterX, refY: 0, refY2: contentStartY + labelBBox.height / 2,                     textAnchor: 'middle', textVerticalAnchor: 'middle' });
      jointCell.attr('descriptionLabel', { refX: 0, refX2: textCenterX, refY: 0, refY2: contentStartY + labelBBox.height + descBBox.height / 2,    textAnchor: 'middle', textVerticalAnchor: 'middle' });
    } else {
      jointCell.attr('label', { refX: 0, refX2: textCenterX, refY: 0.5, refY2: 0, textAnchor: 'middle', textVerticalAnchor: 'middle' });
    }

    jointCell.resize(newWidth, newHeight);
  }

  // ══════════════════════════════════════════════════════════════
  // Internal: utility helpers
  // ══════════════════════════════════════════════════════════════
  _isMobileDevice() {
    return window.matchMedia('(pointer:coarse) and (max-width:767px)').matches;
  }

  _createElement(tagName, className = '') {
    const element = document.createElement(tagName);
    if (className) element.className = className;
    return element;
  }

  _createZoomButton(parentElement, tooltipTitle, innerHTMLContent) {
    const button = parentElement.appendChild(this._createElement('button', 'wf-ctrl-btn'));
    button.title     = tooltipTitle;
    button.innerHTML = innerHTMLContent;
    return button;
  }

  _zoomAroundPoint(zoomFactor, clientX, clientY) {
    const currentScale = this._jointPaper.scale().sx;
    const newScale     = Math.max(0.1, Math.min(10, currentScale * zoomFactor));
    const paperRect    = this._jointPaper.el.getBoundingClientRect();
    const viewportX    = clientX - paperRect.left;
    const viewportY    = clientY - paperRect.top;
    const translation  = this._jointPaper.translate();
    const originX      = (viewportX - translation.tx) / currentScale;
    const originY      = (viewportY - translation.ty) / currentScale;
    this._jointPaper.scale(newScale, newScale);
    this._jointPaper.translate(viewportX - originX * newScale, viewportY - originY * newScale);
  }

  _zoomAroundCenter(zoomFactor) {
    const paperRect = this._jointPaper.el.getBoundingClientRect();
    this._zoomAroundPoint(zoomFactor, paperRect.left + paperRect.width / 2, paperRect.top + paperRect.height / 2);
  }

  _findNearestClearPosition(startX, startY, shapeWidth, shapeHeight, excludeCell = null) {
    const clearanceDistance = this._shapeClearanceGridUnits * this._gridSize;
    let snappedX = Math.round(startX / this._gridSize) * this._gridSize;
    let snappedY = Math.round(startY / this._gridSize) * this._gridSize;

    const isPositionObstructed = (testX, testY) => {
      const testRect = new joint.g.Rect(testX, testY, shapeWidth, shapeHeight).inflate(clearanceDistance);
      return this._jointGraph.getElements().some(element => {
        if (excludeCell && element.id === excludeCell.id) return false;
        return testRect.intersect(element.getBBox().clone().inflate(clearanceDistance));
      });
    };

    if (!isPositionObstructed(snappedX, snappedY)) return { x: snappedX, y: snappedY };

    for (let searchRadius = 1; searchRadius < 30; searchRadius++) {
      for (let dx = -searchRadius; dx <= searchRadius; dx++) {
        for (let dy = -searchRadius; dy <= searchRadius; dy++) {
          if (Math.abs(dx) !== searchRadius && Math.abs(dy) !== searchRadius) continue;
          const testX = snappedX + dx * this._gridSize;
          const testY = snappedY + dy * this._gridSize;
          if (!isPositionObstructed(testX, testY)) return { x: testX, y: testY };
        }
      }
    }

    return { x: snappedX, y: snappedY };
  }

  _getTouchDistance(touch1, touch2) {
    const dx = touch1.clientX - touch2.clientX;
    const dy = touch1.clientY - touch2.clientY;
    return Math.sqrt(dx * dx + dy * dy);
  }

  _getTouchMidpoint(touch1, touch2) {
    return { x: (touch1.clientX + touch2.clientX) / 2, y: (touch1.clientY + touch2.clientY) / 2 };
  }
}

// ═══════════════════════════════════════════════════════════════
// Bootstrap — create the canvas and add demo shapes
// ═══════════════════════════════════════════════════════════════
const canvas = new Canvas(document.body);

const TaskShape = Shape.define(
  Rectangle,
  { label: 'New Task', backgroundColor: '#f0f8ff' },
  {
    assignee: { label: 'Assignee', type: 'text',     default: '' },
    effort:   { label: 'Effort',   type: 'number',   default: 1, min: 1, max: 10 },
    done:     { label: 'Done',     type: 'boolean',  default: false },
    mode:     { label: 'Mode',     type: 'choice',   default: 'auto', choices: { auto: 'Automatic', manual: 'Manual' } },
    note:     { label: 'Note',     type: 'textarea', default: '' },
    accent:   { label: 'Accent',   type: 'color',    default: '#3498db' },
  },
  shape => {
    shape.backgroundColor = shape.getCustomProperty('done') ? '#d4edda' : '#f0f8ff';
    shape.borderColor     = shape.getCustomProperty('done') ? '#28a745' : '#adb5bd';
  }
);
canvas.registerShape('Task', TaskShape);

(async () => {
  const startShape   = await canvas.addShape(new Ellipse({ label: 'START' }));
  const processShape = await canvas.addShape(new Rectangle({ label: 'PROCESS' }));
  const taskShape    = await canvas.addShape(new TaskShape({ label: 'My Task', assignee: 'Alice', effort: 3 }));
})();
