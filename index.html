<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"
    />
    <title>Diagram Editor</title>
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/jointjs/3.7.7/joint.min.css"
    />
    <link rel="stylesheet" href="./index.css" />
    <style></style>
  </head>
  <body>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/lodash.js/4.17.21/lodash.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/backbone.js/1.4.1/backbone-min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jointjs/3.7.7/joint.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/dagre/0.8.5/dagre.min.js"></script>
    <script src="./index.js"></script>
    <script>
      // =============================================================
      // Bootstrap — create the editor and add demo nodes
      // =============================================================

      const editor = new DiagramEditor(document.body);

      // example custom node type with extra properties and a render callback
      const TaskNode = Node.define(
        Rectangle,
        { label: "New Task", backgroundColor: "#f0f8ff" },
        {
          assignee: { label: "Assignee", type: "text", default: "" },
          effort: {
            label: "Effort",
            type: "number",
            default: 1,
            min: 1,
            max: 10,
          },
          done: { label: "Done", type: "boolean", default: false },
          mode: {
            label: "Mode",
            type: "choice",
            default: "auto",
            choices: { auto: "Automatic", manual: "Manual" },
          },
          note: { label: "Note", type: "textarea", default: "" },
          accent: { label: "Accent", type: "color", default: "#3498db" },
        },
        (node) => {
          // update the node's appearance when the 'done' flag changes
          node.backgroundColor = node.getCustomProperty("done")
            ? "#d4edda"
            : "#f0f8ff";
          node.borderColor = node.getCustomProperty("done")
            ? "#28a745"
            : "#adb5bd";
        },
      );
      editor.registerNodeType("Task", TaskNode);

      (async () => {
        const start = await editor.addNode(new Ellipse({ label: "START" }));
        const process = await editor.addNode(
          new Rectangle({ label: "PROCESS" }),
        );
        const task = await editor.addNode(
          new TaskNode({ label: "My Task", assignee: "Alice", effort: 3 }),
        );
      })();
    </script>
  </body>
</html>
