<script src="https://cdnjs.cloudflare.com/ajax/libs/jquery/3.6.4/jquery.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/lodash.js/4.17.21/lodash.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/backbone.js/1.4.1/backbone-min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jointjs/3.7.7/joint.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/dagre/0.8.5/dagre.min.js"></script>
<script>
'use strict';

// ═══════════════════════════════════════════════════════════════
// EventBus — minimal pub/sub base class
// ═══════════════════════════════════════════════════════════════
class EventBus {
  constructor() {
    this.listeners = {};
  }

  on(eventName, callback) {
    if (!this.listeners[eventName]) {
      this.listeners[eventName] = [];
    }
    this.listeners[eventName].push(callback);
    return this;
  }

  off(eventName, callback) {
    if (!this.listeners[eventName]) {
      return this;
    }
    this.listeners[eventName] = this.listeners[eventName].filter(fn => fn !== callback);
    return this;
  }

  emit(eventName, ...args) {
    (this.listeners[eventName] || []).forEach(fn => fn(...args));
    return this;
  }
}

// ═══════════════════════════════════════════════════════════════
// PathPoint — a single movable bend point on an edge's path
// ═══════════════════════════════════════════════════════════════
class PathPoint extends EventBus {
  constructor(parentEdge, pointIndex) {
    super();
    this.id         = `pathpoint-${Math.random().toString(36).slice(2)}`;
    this.edge       = parentEdge;
    this.pointIndex = pointIndex;
  }

  get x() {
    return this.edge.vertices()[this.pointIndex]?.x ?? 0;
  }

  get y() {
    return this.edge.vertices()[this.pointIndex]?.y ?? 0;
  }

  moveTo(x, y) {
    const points = [...this.edge.vertices()];
    points[this.pointIndex] = { x, y };
    this.edge.vertices(points);
    this.emit('move', this);
    return this;
  }

  moveBy(dx, dy) {
    return this.moveTo(this.x + dx, this.y + dy);
  }

  remove() {
    const points = [...this.edge.vertices()];
    points.splice(this.pointIndex, 1);
    this.edge.vertices(points);
    this.emit('remove', this);
  }
}

// ═══════════════════════════════════════════════════════════════
// Arrow marker definitions for edge endpoints
// ═══════════════════════════════════════════════════════════════
const ARROW_MARKERS = {
  none:    null,
  classic: { type: 'path', d: 'M 10 -5 0 0 10 5 Z' },
  block:   { type: 'path', d: 'M 10 -10 0 0 10 10 Z' }
};

// ═══════════════════════════════════════════════════════════════
// Edge — a connection between two nodes
// ═══════════════════════════════════════════════════════════════
class Edge extends EventBus {
  constructor(link, sourceNode, targetNode, editor) {
    super();
    this.link       = link;
    this.sourceNode = sourceNode;
    this.targetNode = targetNode;
    this.editor     = editor;
    this.pathPoints = [];
  }

  get id() {
    return this.link.id;
  }

  get source() {
    return this.sourceNode;
  }

  get target() {
    return this.targetNode;
  }

  get label() {
    return this.link.label(0)?.attrs?.text?.text || '';
  }

  set label(value) {
    this._applyLabel(value);
    this.emit('change', this);
  }

  get labelColor() {
    return this.link.label(0)?.attrs?.text?.fill || '#333333';
  }

  set labelColor(value) {
    this.link.prop('labelColor', value);
    this._applyLabel(this.label);
    this.emit('change', this);
  }

  get labelFontSize() {
    return this.link.get('fontSizePercent') || 100;
  }

  set labelFontSize(value) {
    this.link.set('fontSizePercent', value);
    this._applyLabel(this.label);
    this.emit('change', this);
  }

  get lineColor() {
    return this.link.attr('line/stroke') || '#495057';
  }

  set lineColor(value) {
    this.link.attr('line/stroke', value);
    this.emit('change', this);
  }

  get lineWidth() {
    return this.link.attr('line/strokeWidth') || 2;
  }

  set lineWidth(value) {
    this.link.attr('line/strokeWidth', value);
    this.emit('change', this);
  }

  get lineStyle() {
    const dash = this.link.attr('line/strokeDasharray') || '';
    if (dash === '5,5') {
      return 'dashed';
    }
    if (dash === '1,5') {
      return 'dotted';
    }
    return 'solid';
  }

  set lineStyle(value) {
    if (value === 'dashed') {
      this.link.attr('line/strokeDasharray', '5,5');
    } else if (value === 'dotted') {
      this.link.attr('line/strokeDasharray', '1,5');
    } else {
      this.link.attr('line/strokeDasharray', '');
    }
    this.emit('change', this);
  }

  get sourceArrow() {
    return this._arrowNameFromDefinition(this.link.attr('line/sourceMarker'));
  }

  set sourceArrow(value) {
    this.link.attr('line/sourceMarker', ARROW_MARKERS[value] || null);
    this.emit('change', this);
  }

  get targetArrow() {
    return this._arrowNameFromDefinition(this.link.attr('line/targetMarker'));
  }

  set targetArrow(value) {
    this.link.attr('line/targetMarker', ARROW_MARKERS[value] || null);
    this.emit('change', this);
  }

  get connectorType() {
    const connector = this.link.connector()?.name;
    const router    = this.link.router()?.name;
    if (connector === 'smooth') {
      return 'curved';
    }
    if (router === 'normal') {
      return 'straight';
    }
    return 'elbow';
  }

  set connectorType(value) {
    const gridSize = this.editor.gridSize;
    if (value === 'elbow') {
      this.link.router('manhattan', { step: gridSize, padding: 20 });
      this.link.connector('rounded');
    } else if (value === 'straight') {
      this.link.router('normal');
      this.link.connector('normal');
    } else {
      this.link.router('normal');
      this.link.connector('smooth');
    }
    this.emit('change', this);
  }

  get sourcePort() {
    return this.link.get('sourcePort') ?? null;
  }

  set sourcePort(value) {
    this._setPort('source', value);
  }

  get targetPort() {
    return this.link.get('targetPort') ?? null;
  }

  set targetPort(value) {
    this._setPort('target', value);
  }

  get description() {
    return this.link.get('description') || '';
  }

  set description(value) {
    this.link.set('description', value);
    this.emit('change', this);
  }

  getPathPoints() {
    return [...this.pathPoints];
  }

  addPathPoint(x, y) {
    const points = [...this.link.vertices(), { x, y }];
    this.link.vertices(points);
    const point = new PathPoint(this.link, points.length - 1);
    this.pathPoints.push(point);
    return point;
  }

  select() {
    this.editor._selectItem(this);
    return this;
  }

  deselect() {
    this.editor.clearSelection();
    return this;
  }

  remove() {
    this.link.remove();
    this.emit('remove', this);
  }

  _applyLabel(text) {
    const fontSize = 12 * ((this.link.get('fontSizePercent') || 100) / 100);
    const color    = this.link.get('labelColor') || '#333333';
    if (text) {
      this.link.labels([{
        attrs: {
          text: { text, fill: color, fontSize, textVerticalAnchor: 'middle' },
          rect: { fill: 'white', opacity: 0.9 }
        },
        position: { distance: 0.5 }
      }]);
    } else {
      this.link.labels([]);
    }
  }

  _arrowNameFromDefinition(definition) {
    if (!definition) {
      return 'none';
    }
    if (definition.d === ARROW_MARKERS.classic.d) {
      return 'classic';
    }
    if (definition.d === ARROW_MARKERS.block.d) {
      return 'block';
    }
    return 'none';
  }

  _setPort(side, portIndex) {
    const node = side === 'source' ? this.sourceNode : this.targetNode;
    this.link.set(`${side}Port`, portIndex);
    if (portIndex === null) {
      this.link[side]({ id: node.cell.id });
    } else {
      const port = node.cell.getPorts()[portIndex - 1];
      if (port) {
        this.link[side]({ id: node.cell.id, port: port.id });
      }
    }
    this.emit('change', this);
  }
}

// ═══════════════════════════════════════════════════════════════
// Node — base class for a diagram shape
// ═══════════════════════════════════════════════════════════════
class Node extends EventBus {
  constructor(options = {}) {
    super();
    this._label       = typeof options === 'string' ? options : (options.label ?? '');
    this._initOptions = typeof options === 'string' ? {} : options;
    this.cell         = null;
    this.editor       = null;
    this.schema       = {};
    this.customProps  = {};
    this.renderFn     = null;
  }

  getCustomProperty(key) {
    return this.customProps[key];
  }

  setCustomProperty(key, value) {
    this.customProps[key] = value;
    this.cell?.set(`custom_${key}`, value);
    if (this.renderFn) {
      this.renderFn(this);
    }
    this.emit('change', this);
  }

  getSchema() {
    return this.schema;
  }

  get id() {
    return this.cell?.id ?? null;
  }

  get x() {
    return this.cell?.position().x ?? 0;
  }

  set x(value) {
    this.cell?.position(value, this.y);
    this.emit('change', this);
  }

  get y() {
    return this.cell?.position().y ?? 0;
  }

  set y(value) {
    this.cell?.position(this.x, value);
    this.emit('change', this);
  }

  get width() {
    return this.cell?.size().width ?? 0;
  }

  get height() {
    return this.cell?.size().height ?? 0;
  }

  get portCount() {
    return 4;
  }

  get label() {
    return this.cell?.attr('label/text') ?? this._label;
  }

  set label(value) {
    this.cell?.attr('label/text', value);
    this._label = value;
    this._resizeToFitContent();
    this.emit('change', this);
  }

  get labelColor() {
    return this.cell?.attr('label/fill') ?? '#212529';
  }

  set labelColor(value) {
    this.cell?.attr('label/fill', value);
    this.emit('change', this);
  }

  get labelFontSize() {
    return this.cell?.get('fontSizePercent') ?? 100;
  }

  set labelFontSize(value) {
    this.cell?.set('fontSizePercent', value);
    this._resizeToFitContent();
    this.emit('change', this);
  }

  get description() {
    return this.cell?.get('description') ?? '';
  }

  set description(value) {
    this.cell?.set('description', value);
    this.cell?.attr('descriptionLabel/text', value);
    this._resizeToFitContent();
    this.emit('change', this);
  }

  get descriptionColor() {
    return this.cell?.attr('descriptionLabel/fill') ?? '#6c757d';
  }

  set descriptionColor(value) {
    this.cell?.attr('descriptionLabel/fill', value);
    this.emit('change', this);
  }

  get backgroundColor() {
    return this.cell?.attr('body/fill') ?? '#ffffff';
  }

  set backgroundColor(value) {
    this.cell?.attr('body/fill', value);
    this.emit('change', this);
  }

  get borderColor() {
    return this.cell?.attr('body/stroke') ?? '#adb5bd';
  }

  set borderColor(value) {
    this.cell?.attr('body/stroke', value);
    this.emit('change', this);
  }

  get borderWidth() {
    return this.cell?.attr('body/strokeWidth') ?? 2;
  }

  set borderWidth(value) {
    this.cell?.attr('body/strokeWidth', value);
    this.emit('change', this);
  }

  get imageUrl() {
    return this.cell?.get('imageUrl') ?? '';
  }

  set imageUrl(value) {
    this.cell?.set('imageUrl', value);
    this.cell?.attr('image/xlink:href', value);
    this.cell?.attr('image/display', value ? 'block' : 'none');
    this._resizeToFitContent();
    this.emit('change', this);
  }

  get imageWidth() {
    return this.cell?.get('imageWidth') ?? 32;
  }

  set imageWidth(value) {
    this.cell?.set('imageWidth', value);
    this._resizeToFitContent();
    this.emit('change', this);
  }

  get imageHeight() {
    return this.cell?.get('imageHeight') ?? 32;
  }

  set imageHeight(value) {
    this.cell?.set('imageHeight', value);
    this._resizeToFitContent();
    this.emit('change', this);
  }

  get status() {
    return this.cell?.get('status') ?? 'pending';
  }

  set status(value) {
    this.cell?.set('status', value);
    this.emit('change', this);
  }

  get priority() {
    return this.cell?.get('priority') ?? 1;
  }

  set priority(value) {
    this.cell?.set('priority', value);
    this.emit('change', this);
  }

  moveTo(x, y) {
    this.cell?.position(x, y);
    this.emit('move', this);
    return this;
  }

  moveBy(dx, dy) {
    return this.moveTo(this.x + dx, this.y + dy);
  }

  toFront() {
    this.cell?.toFront();
    return this;
  }

  toBack() {
    this.cell?.toBack();
    return this;
  }

  select() {
    this.editor?._selectItem(this);
    return this;
  }

  deselect() {
    this.editor?.clearSelection();
    return this;
  }

  getEdges() {
    return this.editor?._getEdgesForNode(this) ?? [];
  }

  getIncomingEdges() {
    return this.getEdges().filter(e => e.target === this);
  }

  getOutgoingEdges() {
    return this.getEdges().filter(e => e.source === this);
  }

  connect(targetNode, sourcePortIndex = null, targetPortIndex = null) {
    if (targetNode === this) {
      throw new Error('A node cannot connect to itself.');
    }
    return this.editor?._createEdge(this, targetNode, sourcePortIndex, targetPortIndex);
  }

  remove() {
    this.cell?.remove();
    this.emit('remove', this);
  }

  _buildCell(position, jointNamespace) {
    throw new Error('_buildCell must be implemented by subclass');
  }

  _resizeToFitContent() {
    if (!this.editor || !this.cell) {
      return;
    }
    this.editor._fitNodeToContent(this.cell);
  }

  _getShapeType() {
    return 'rect';
  }
}

// ═══════════════════════════════════════════════════════════════
// Node.define — factory that creates custom node classes
// ═══════════════════════════════════════════════════════════════
Node.define = function(BaseNodeClass, defaultOptions = {}, schema = {}, renderFn = null) {
  class CustomNode extends BaseNodeClass {
    constructor(options = {}) {
      super();
      this.customProps     = {};
      this.schema          = schema;
      this.renderFn        = renderFn;
      this._defaultOptions = defaultOptions;

      const merged  = { ...defaultOptions, ...options };
      const builtIns = ['label','labelColor','labelFontSize','description','descriptionColor','backgroundColor','borderColor','borderWidth','imageUrl','imageWidth','imageHeight','status','priority'];
      builtIns.forEach(key => {
        if (merged[key] !== undefined) {
          this[`_init_${key}`] = merged[key];
        }
      });
      this._label = merged.label ?? defaultOptions.label ?? '';

      Object.entries(schema).forEach(([key, def]) => {
        this.customProps[key] = options[key] !== undefined ? options[key] : def.default;
      });
    }

    getCustomProperty(key) {
      return this.customProps[key];
    }

    setCustomProperty(key, value) {
      if (!(key in this.schema)) {
        throw new Error(`Unknown custom property: ${key}`);
      }
      this.customProps[key] = value;
      this.cell?.set(`custom_${key}`, value);
      if (this.renderFn) {
        this.renderFn(this);
      }
      this.emit('change', this);
    }

    getSchema() {
      return this.schema;
    }

    _buildCell(position, jointNamespace) {
      return super._buildCell(position, jointNamespace);
    }
  }

  CustomNode.prototype._getShapeType = BaseNodeClass.prototype._getShapeType;
  Object.defineProperty(
    CustomNode.prototype,
    'portCount',
    Object.getOwnPropertyDescriptor(BaseNodeClass.prototype, 'portCount') || { get() { return 4; } }
  );
  return CustomNode;
};

// ═══════════════════════════════════════════════════════════════
// Concrete node shape subclasses
// ═══════════════════════════════════════════════════════════════
class Rectangle extends Node {
  get portCount() {
    return 4;
  }

  _getShapeType() {
    return 'rect';
  }

  _buildCell(pos, ns) {
    return _buildRectangleCell(pos, ns, 'rect', 140, 50);
  }
}

class Square extends Node {
  get portCount() {
    return 4;
  }

  _getShapeType() {
    return 'square';
  }

  _buildCell(pos, ns) {
    return _buildRectangleCell(pos, ns, 'square', 80, 80);
  }
}

class Ellipse extends Node {
  get portCount() {
    return 4;
  }

  _getShapeType() {
    return 'ellipse';
  }

  _buildCell(pos, ns) {
    return _buildEllipseCell(pos, ns, 'ellipse', 140, 50);
  }
}

class Circle extends Node {
  get portCount() {
    return 4;
  }

  _getShapeType() {
    return 'circle';

// ═══════════════════════════════════════════════════════════════
// Shared JointJS cell construction helpers
// ═══════════════════════════════════════════════════════════════
const SHARED_CELL_MARKUP = [
  { tagName: 'image',  selector: 'image',            className: 'image' },
  { tagName: 'text',   selector: 'label',            className: 'label' },
  { tagName: 'text',   selector: 'descriptionLabel', className: 'descriptionLabel' }
];

const SHARED_CELL_ATTRS = {
  image:            { display: 'none' },
  label:            { fill: '#212529', fontSize: 13, fontWeight: 'bold', pointerEvents: 'none' },
  descriptionLabel: { text: '', fill: '#6c757d', fontSize: 11, pointerEvents: 'none' }
};

const SHARED_CELL_DEFAULTS = {
  description: '', status: 'pending', priority: 1,
  imageUrl: '', imageWidth: 32, imageHeight: 32, fontSizePercent: 100
};

function _attachPortsToCell(cell, polygonPoints) {
  cell.prop('ports/groups', {
    all: {
      position: 'absolute',
      attrs: {
        circle: { r: 6, fill: '#3498db', magnet: true, stroke: '#fff', strokeWidth: 2, pointerEvents: 'all' },
        text:   { display: 'none' }
      }
    }
  });

  let ports;
  if (polygonPoints.length === 0) {
    ports = [
      { group: 'all', args: { x: '50%',  y: '0%',   dy: -1 } },
      { group: 'all', args: { x: '100%', y: '50%'          } },
      { group: 'all', args: { x: '50%',  y: '100%', dy: 1  } },
      { group: 'all', args: { x: '0%',   y: '50%'          } }
    ];
  } else {
    ports = polygonPoints.map((point, i) => {
      const next = polygonPoints[(i + 1) % polygonPoints.length];
      return {
        group: 'all',
        args: {
          x: `${((point[0] + next[0]) / 2 / 20) * 100}%`,
          y: `${((point[1] + next[1]) / 2 / 20) * 100}%`
        }
      };
    });
  }

  cell.addPorts(ports);
}

function _buildRectangleCell(position, ns, shapeType, w, h) {
  const cell = new ns.standard.Rectangle();
  cell.markup = [{ tagName: 'rect', selector: 'body', className: 'body' }, ...SHARED_CELL_MARKUP];
  cell.position(position.x, position.y).resize(w, h);
  cell.attr({ body: { fill: '#ffffff', stroke: '#adb5bd', strokeWidth: 2, rx: 5, ry: 5 }, ...SHARED_CELL_ATTRS });
  cell.set({ type: shapeType, ...SHARED_CELL_DEFAULTS });
  _attachPortsToCell(cell, []);
  return cell;
}

function _buildEllipseCell(position, ns, shapeType, w, h) {
  const cell = new ns.standard.Ellipse();
  cell.markup = [{ tagName: 'ellipse', selector: 'body', className: 'body' }, ...SHARED_CELL_MARKUP];
  cell.position(position.x, position.y).resize(w, h);
  cell.attr({ body: { fill: '#ffffff', stroke: '#adb5bd', strokeWidth: 2 }, ...SHARED_CELL_ATTRS });
  cell.set({ type: shapeType, ...SHARED_CELL_DEFAULTS });
  _attachPortsToCell(cell, []);
  return cell;
}

function _buildPolygonCell(position, ns, shapeType, w, h, points) {
  const cell = new ns.standard.Polygon();
  cell.markup = [{ tagName: 'polygon', selector: 'body', className: 'body' }, ...SHARED_CELL_MARKUP];
  cell.position(position.x, position.y).resize(w, h);
  cell.attr({ body: { refPoints: points.map(p => p.join(',')).join(' '), fill: '#ffffff', stroke: '#adb5bd', strokeWidth: 2 }, ...SHARED_CELL_ATTRS });
  cell.set({ type: shapeType, ...SHARED_CELL_DEFAULTS });
  _attachPortsToCell(cell, points);
  return cell;
}

// ═══════════════════════════════════════════════════════════════
// DiagramEditor — the main controller
// ═══════════════════════════════════════════════════════════════
class DiagramEditor extends EventBus {
  constructor(container) {
    super();
    this.container                 = container;
    this.gridSize                  = 10;
    this.clearanceUnits            = 4;
    this.nodeMap                   = new Map();
    this.edgeMap                   = new Map();
    this.selection                 = null;
    this.autoPortsOn               = true;
    this.isLoading                 = false;
    this.touchState                = null;
    this.pointerDownAt             = null;
    this.selectionWasAlreadyActive = false;
    this.registeredNodeTypes       = {};

    this._buildLayout();
    this._setupRenderer();
    this._attachButtonListeners();
    this._attachDiagramListeners();
    this._attachTouchListeners();
    this._attachKeyboardShortcuts();

    ['node:add','node:remove','node:change','node:move','edge:add','edge:remove','edge:change']
      .forEach(event => {
        this.on(event, () => {
          if (!this.isLoading) {
            this.emit('change');
          }
        });
      });

    if (this._isMobile()) {
      this._setSidebarCollapsed(this.leftSidebar, true);
      this._setSidebarCollapsed(this.rightSidebar, true);
    }
  }

  // ── Public: register a node type in the shape library ──
  registerNodeType(label, NodeClass) {
    const item = this.shapeLibrary.appendChild(this._makeElement('div', 'wf-node-template'));
    item.textContent       = label;
    item.draggable         = true;
    item.dataset.nodeTypeLabel = label;

    item.addEventListener('click', () => {
      if (!this._isMobile()) {
        return;
      }
      this.addNode(new NodeClass());
      if (!this.leftSidebar.classList.contains('wf-collapsed')) {
        this._toggleSidebar(this.leftSidebar);
      }
    });

    item.addEventListener('dragstart', e => e.dataTransfer.setData('customNode', label));
    this.registeredNodeTypes[label] = NodeClass;
  }

  // ── Public: add a node to the diagram ──
  addNode(node, canvasX, canvasY) {
    const ns      = joint.shapes;
    const area    = this.canvasArea;
    const centerX = canvasX ?? area.clientWidth  / 2;
    const centerY = canvasY ?? area.clientHeight / 2;

    const localPoint = this.renderer.clientToLocalPoint({
      x: centerX + area.getBoundingClientRect().left,
      y: centerY + area.getBoundingClientRect().top
    });

    const isSquarish = node instanceof Square || node instanceof Circle || node instanceof Diamond;
    const w = isSquarish ? 80 : 140;
    const h = isSquarish ? 80 : 50;

    const openPos = this._findOpenPosition(localPoint.x - w / 2, localPoint.y - h / 2, w, h);
    const cell    = node._buildCell(openPos, ns);
    cell.attr('label/text', node._label);

    node.cell   = cell;
    node.editor = this;

    const builtIns = ['label','labelColor','labelFontSize','description','descriptionColor','backgroundColor','borderColor','borderWidth','imageUrl','imageWidth','imageHeight','status','priority'];
    const initOpts = node._initOptions || {};
    builtIns.forEach(key => {
      const value = initOpts[key] ?? node[`_init_${key}`];
      if (value !== undefined) {
        node[key] = value;
      }
    });
    Object.entries(node.customProps).forEach(([key, value]) => cell.set(`custom_${key}`, value));

    cell.addTo(this.graph);
    this.nodeMap.set(cell.id, node);
    this.clearSelection();

    const ready = (async () => {
      await this._waitForRender(cell);
      await this._resizeNodeAsync(cell);
      if (node.renderFn) {
        node.renderFn(node);
      }
      await this._waitForRender(cell);
      node.on('change', n => this.emit('node:change', n));
      node.on('move',   n => this.emit('node:move',   n));
      return node;
    })();

    this.emit('node:add', node);
    return ready;
  }

  removeNode(node) {
    node.remove();
    this.nodeMap.delete(node.id);
    this.emit('node:remove', node);
  }

  getNodes() {
    return [...this.nodeMap.values()];
  }

  getEdges() {
    return [...this.edgeMap.values()];
  }

  // ── Viewport controls ──
  panTo(x, y) {
    this.renderer.translate(x, y);
    return this;
  }

  centerContent() {
    const bbox = this.graph.getBBox();
    if (!bbox) {
      return this;
    }
    const size = this.renderer.getComputedSize();
    this.renderer.scale(1, 1);
    this.renderer.translate(
      size.width  / 2 - (bbox.x + bbox.width  / 2),
      size.height / 2 - (bbox.y + bbox.height / 2)
    );
    return this;
  }

  zoomIn(factor = 1.25) {
    this._zoomAtCenter(factor);
    return this;
  }

  zoomOut(factor = 0.8) {
    this._zoomAtCenter(factor);
    return this;
  }

  zoomReset() {
    this._zoomAtCenter(1 / this.renderer.scale().sx);
    return this;
  }

  zoomToFit() {
    this.renderer.scaleContentToFit({ padding: 50, minScale: 0.2, maxScale: 2 });
    return this;
  }

  getZoomLevel() {
    return this.renderer.scale().sx;
  }

  getSelectedItem() {
    return this.selection;
  }

  clearSelection() {
    this._deselectAll();
    return this;
  }

  setAutoPortSwitching(enabled) {
    this.autoPortsOn = enabled;
    this.autoPortToggleButton.classList.toggle('active', enabled);
    if (enabled) {
      this.graph.getElements().forEach(el => this._updateConnectionPorts(el));
    }
    return this;
  }

  autoArrange() {
    const dagreGraph = new dagre.graphlib.Graph();
    dagreGraph.setGraph({ rankdir: 'TB', ranksep: 60, nodesep: 40, marginx: 40, marginy: 40 });
    dagreGraph.setDefaultEdgeLabel(() => ({}));

    this.graph.getElements().forEach(el => {
      const { width, height } = el.size();
      dagreGraph.setNode(el.id, { width, height });
    });

    this.graph.getLinks().forEach(link => {
      const src = link.getSourceElement();
      const tgt = link.getTargetElement();
      if (src && tgt) {
        dagreGraph.setEdge(src.id, tgt.id);
      }
    });

    dagre.layout(dagreGraph);

    this.graph.getElements().forEach(el => {
      const n = dagreGraph.node(el.id);
      if (!n) {
        return;
      }
      el.position(Math.round(n.x - n.width / 2), Math.round(n.y - n.height / 2));
    });

    if (this.autoPortsOn) {
      this.graph.getElements().forEach(el => this._updateConnectionPorts(el));
    }
    this.centerContent();
    return this;
  }

  // ── Serialize the diagram to JSON ──
  serialize() {
    const nodes = [...this.nodeMap.values()].map(node => ({
      id: node.cell.id,
      nodeClass: node.constructor.name,
      x: node.x,
      y: node.y,
      props: {
        label:            node.label,
        labelColor:       node.labelColor,
        labelFontSize:    node.labelFontSize,
        description:      node.description,
        descriptionColor: node.descriptionColor,
        backgroundColor:  node.backgroundColor,
        borderColor:      node.borderColor,
        borderWidth:      node.borderWidth,
        imageUrl:         node.imageUrl,
        imageWidth:       node.imageWidth,
        imageHeight:      node.imageHeight,
      },
      customProps: { ...node.customProps },
    }));

    const edges = [...this.edgeMap.values()].map(edge => {
      const resolvePort = (endpoint, node) => {
        const portId = endpoint?.port;
        if (!portId) {
          return null;
        }
        const index = node.cell.getPorts().findIndex(p => p.id === portId);
        return index >= 0 ? index + 1 : null;
      };
      return {
        sourceId:      edge.source.cell.id,
        targetId:      edge.target.cell.id,
        sourcePort:    resolvePort(edge.link.source(), edge.source),
        targetPort:    resolvePort(edge.link.target(), edge.target),
        label:         edge.label,
        labelColor:    edge.labelColor,
        labelFontSize: edge.labelFontSize,
        lineColor:     edge.lineColor,
        lineWidth:     edge.lineWidth,
        lineStyle:     edge.lineStyle,
        sourceArrow:   edge.sourceArrow,
        targetArrow:   edge.targetArrow,
        connectorType: edge.connectorType,
        description:   edge.description,
        vertices:      edge.link.vertices(),
      };
    });

    return JSON.stringify({ nodes, edges });
  }

  // ── Deserialize JSON and rebuild the diagram ──
  async deserialize(json) {
    const { nodes: nodeDataList, edges: edgeDataList } = typeof json === 'string' ? JSON.parse(json) : json;
    if (!Array.isArray(nodeDataList)) {
      throw new Error('Invalid diagram file format.');
    }

    this._deselectAll();
    this.nodeMap.clear();
    this.edgeMap.clear();
    this.graph.clear();

    const nodeClassMap = {
      Rectangle, Square, Ellipse, Circle, Diamond, Triangle, Hexagon, Pentagon, Octagon,
      ...Object.fromEntries(Object.entries(this.registeredNodeTypes).map(([, cls]) => [cls.name, cls]))
    };

    this.autoPortsOn = false;
    this.isLoading   = true;

    const oldIdToNode = {};

    for (const nodeData of nodeDataList) {
      const NodeClass = nodeClassMap[nodeData.nodeClass];
      if (!NodeClass) {
        console.warn(`Unknown node class: ${nodeData.nodeClass}`);
        continue;
      }

      const node = new NodeClass({ ...nodeData.props, ...nodeData.customProps });
      const cell = node._buildCell({ x: nodeData.x, y: nodeData.y }, joint.shapes);
      cell.attr('label/text', node._label);
      node.cell   = cell;
      node.editor = this;

      const builtIns = ['label','labelColor','labelFontSize','description','descriptionColor','backgroundColor','borderColor','borderWidth','imageUrl','imageWidth','imageHeight','status','priority'];
      const initOpts = node._initOptions || {};
      builtIns.forEach(key => {
        const value = initOpts[key] ?? node[`_init_${key}`];
        if (value !== undefined) {
          node[key] = value;
        }
      });
      Object.entries(node.customProps).forEach(([key, value]) => cell.set(`custom_${key}`, value));

      cell.addTo(this.graph);
      this.nodeMap.set(cell.id, node);

      await new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));
      this._fitNodeToContent(cell);
      await new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));
      this.renderer.updateViews();

      if (node.renderFn) {
        node.renderFn(node);
      }

      node.on('change', n => this.emit('node:change', n));
      node.on('move',   n => this.emit('node:move',   n));

      oldIdToNode[nodeData.id] = node;
    }

    for (const edgeData of edgeDataList) {
      const sourceNode = oldIdToNode[edgeData.sourceId];
      const targetNode = oldIdToNode[edgeData.targetId];
      if (!sourceNode || !targetNode) {
        continue;
      }

      const edge = sourceNode.connect(targetNode, edgeData.sourcePort, edgeData.targetPort);
      if (!edge) {
        continue;
      }

      if (edgeData.label) {
        edge.label = edgeData.label;
      }
      if (edgeData.labelColor) {
        edge.labelColor = edgeData.labelColor;
      }
      if (edgeData.labelFontSize) {
        edge.labelFontSize = edgeData.labelFontSize;
      }
      edge.lineColor     = edgeData.lineColor;
      edge.lineWidth     = edgeData.lineWidth;
      edge.lineStyle     = edgeData.lineStyle;
      edge.sourceArrow   = edgeData.sourceArrow;
      edge.targetArrow   = edgeData.targetArrow;
      edge.connectorType = edgeData.connectorType;
      if (edgeData.description) {
        edge.description = edgeData.description;
      }
      if (edgeData.vertices?.length) {
        edge.link.vertices(edgeData.vertices);
      }
    }

    this.isLoading = false;

    const allCells = this.graph.getCells();
    this.graph.resetCells(allCells);
    await new Promise(resolve => requestAnimationFrame(() => requestAnimationFrame(resolve)));

    this.graph.getLinks().forEach(link => {
      const edge = this.edgeMap.get(link.id);
      if (!edge) {
        return;
      }
      const savedEdge = edgeDataList.find(data =>
        oldIdToNode[data.sourceId]?.cell.id === edge.source.cell.id &&
        oldIdToNode[data.targetId]?.cell.id === edge.target.cell.id
      );
      if (!savedEdge) {
        return;
      }
      if (savedEdge.sourcePort != null) {
        link.set('sourcePort', savedEdge.sourcePort);
      }
      if (savedEdge.targetPort != null) {
        link.set('targetPort', savedEdge.targetPort);
      }
    });

    this.emit('change');
    return this;
  }

  // ══════════════════════════════════════════════════════════════
  // Internal: hide/show mobile floating buttons
  // ══════════════════════════════════════════════════════════════
  _updateMobileButtonVisibility() {
    if (!this._isMobile()) {
      return;

      || !this.leftSidebar.classList.contains('wf-collapsed')
      || !this.rightSidebar.classList.contains('wf-collapsed');

    this.topRightButtons.style.display   = display;
    this.topLeftButtons.style.display    = display;
    this.bottomLeftButtons.style.display = display;
  }

  // ══════════════════════════════════════════════════════════════

  _buildShapeLibrary() {
    const builtInShapes = [
      { label: 'Rectangle', type: 'rect',     cls: Rectangle },
      { label: 'Square',    type: 'square',   cls: Square    },
      { label: 'Ellipse',   type: 'ellipse',  cls: Ellipse   },
      { label: 'Circle',    type: 'circle',   cls: Circle    },
      { label: 'Diamond',   type: 'diamond',  cls: Diamond   },
      { label: 'Triangle',  type: 'triangle', cls: Triangle  },
      { label: 'Hexagon',   type: 'hexagon',  cls: Hexagon   },
      { label: 'Pentagon',  type: 'pentagon', cls: Pentagon  },
      { label: 'Octagon',   type: 'octagon',  cls: Octagon   },
    ];

    builtInShapes.forEach(({ label, type, cls }) => {
      const item = this.shapeLibrary.appendChild(this._makeElement('div', 'wf-node-template'));
      item.textContent  = label;
      item.draggable    = true;
      item.dataset.type = type;
      item.addEventListener('dragstart', e => e.dataTransfer.setData('type', type));
      item.addEventListener('click', () => {
        if (!this._isMobile()) {
          return;
        }
        this.addNode(new cls(label.toUpperCase()));
        if (!this.leftSidebar.classList.contains('wf-collapsed')) {
          this._toggleSidebar(this.leftSidebar);
        }
      });
    });
  }

  // ══════════════════════════════════════════════════════════════
  // Internal: JointJS renderer setup
  // ══════════════════════════════════════════════════════════════
  _setupRenderer() {
    this.graph    = new joint.dia.Graph({}, { cellNamespace: joint.shapes });
    this.renderer = new joint.dia.Paper({
      el: this.paperElement,
      model: this.graph,
      width: '100%', height: '100%',
      gridSize: this.gridSize,
      drawGrid: { name: 'dot', color: '#e9ecef' },
      background: { color: '#ffffff' },
      cellNamespace: joint.shapes,
      defaultConnector: { name: 'rounded' },
      defaultRouter: { name: 'manhattan', args: { step: this.gridSize, padding: 30, maxIter: 200 } },
      interactive: { linkMove: true, vertexAdd: true, vertexMove: true, elementMove: true },
      preventDefaultBlankAction: false,
      linkPinning: false,
      snapLinks: { radius: 25 },
      markAvailable: true,
      defaultLink: () => new joint.shapes.standard.Link({
        attrs: { line: { stroke: '#495057', strokeWidth: 2, targetMarker: ARROW_MARKERS.classic } }
      }),
      validateConnection: (srcView, srcMagnet, tgtView, tgtMagnet) => {
        return srcMagnet && tgtMagnet && srcView !== tgtView;
      }
    });
  }

  // ══════════════════════════════════════════════════════════════
  // Internal: button / UI event listeners
  // ══════════════════════════════════════════════════════════════
  _attachButtonListeners() {
    this.exportButton.addEventListener('click', () => {
      try {
        const blob = new Blob([this.serialize()], { type: 'application/json' });
        const url  = URL.createObjectURL(blob);
        const a    = Object.assign(document.createElement('a'), { href: url, download: 'diagram.json' });
        document.body.appendChild(a);
        a.click();
        document.body.removeChild(a);
        setTimeout(() => URL.revokeObjectURL(url), 1000);
      } catch (err) {
        alert('Export failed: ' + err.message);
      }
    });

    this.importButton.addEventListener('click', () => this.importFileInput.click());

    this.importFileInput.addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) {
        return;
      }
      const reader = new FileReader();
      reader.onload = ev => this.deserialize(ev.target.result).catch(err => alert('Import failed: ' + err.message));
      reader.readAsText(file);
      e.target.value = '';
    });

    this.leftCollapseButton.addEventListener('click',   () => this._toggleSidebar(this.leftSidebar));
    this.rightCollapseButton.addEventListener('click',  () => this._toggleSidebar(this.rightSidebar));
    this.autoPortToggleButton.addEventListener('click', () => this.setAutoPortSwitching(!this.autoPortsOn));
    this.autoArrangeButton.addEventListener('click',    () => this.autoArrange());
    this.zoomToFitButton.addEventListener('click',      () => this.zoomToFit());
    this.zoomResetButton.addEventListener('click',      () => this.zoomReset());
    this.zoomInButton.addEventListener('click',         () => this.zoomIn());
    this.zoomOutButton.addEventListener('click',        () => this.zoomOut());
    this.centerButton.addEventListener('click',         () => this.centerContent());

    this.renderer.el.addEventListener('wheel', e => {
      e.preventDefault();
      if (e.ctrlKey) {
        this._zoomAtPoint(Math.exp(-e.deltaY * 0.0015), e.clientX, e.clientY);
      } else {
        const t = this.renderer.translate();
        this.renderer.translate(t.tx - e.deltaX, t.ty - e.deltaY);
      }
    }, { passive: false });

    this.contextMenu.addEventListener('click', e => {
      const action = e.target.closest('[data-action]')?.dataset.action;
      if (action === 'duplicate') {
        this._duplicateSelected();
      }
      if (action === 'delete') {
        this._deleteSelected();
      }
      this.contextMenu.style.display = 'none';
    });

    window.addEventListener('click', e => {
      if (!e.target.closest('.wf-context-menu')) {
        this.contextMenu.style.display = 'none';
      }
    });

    this.propertiesHeaderActions.addEventListener('click', e => {
      const action = e.target.closest('[data-action]')?.dataset.action;
      if (!action) {
        return;
      }
      if (action === 'focus') {
        this._focusCameraOnSelection();
      }
      if (action === 'duplicate') {
        this._duplicateSelected();
        if (this._isMobile()) {
          this._toggleSidebar(this.rightSidebar);
        }
      }
      if (action === 'delete') {
        this._deleteSelected();
        if (this._isMobile()) {
          this._toggleSidebar(this.rightSidebar);
        }
      }
    });

    this.nodePropertiesPanel.addEventListener('input',  e => this._handleNodePropertyChange(e));
    this.nodePropertiesPanel.addEventListener('change', e => this._handleNodePropertyChange(e));
    this.edgePropertiesPanel.addEventListener('input',  e => this._handleEdgePropertyChange(e));
    this.edgePropertiesPanel.addEventListener('change', e => this._handleEdgePropertyChange(e));

    this.canvasArea.addEventListener('dragover', e => e.preventDefault());
    this.canvasArea.addEventListener('drop', e => {
      e.preventDefault();

      const customLabel = e.dataTransfer.getData('customNode');
      if (customLabel && this.registeredNodeTypes?.[customLabel]) {
        const dropPos  = this.renderer.clientToLocalPoint({ x: e.clientX, y: e.clientY });
        const NodeClass = this.registeredNodeTypes[customLabel];
        const node     = new NodeClass();
        const openPos  = this._findOpenPosition(dropPos.x - 70, dropPos.y - 25, 140, 50);
        const cell     = node._buildCell(openPos, joint.shapes);
        cell.attr('label/text', node._label);
        node.cell   = cell;
        node.editor = this;
        Object.entries(node.customProps).forEach(([k, v]) => cell.set(`custom_${k}`, v));
        cell.addTo(this.graph);
        this.nodeMap.set(cell.id, node);
        this.clearSelection();
        (async () => {
          await this._waitForRender(cell);
          await this._resizeNodeAsync(cell);
          if (node.renderFn) {
            node.renderFn(node);
          }
          await this._waitForRender(cell);
          node.on('change', n => this.emit('node:change', n));
          node.on('move',   n => this.emit('node:move',   n));
          this._selectItem(node);
        })();
        this.emit('node:add', node);
        return;
      }

      const droppedType = e.dataTransfer.getData('type');
      const builtInShapes = [
        { type: 'rect',     cls: Rectangle }, { type: 'square',   cls: Square   }, { type: 'ellipse',  cls: Ellipse  },
        { type: 'circle',   cls: Circle    }, { type: 'diamond',  cls: Diamond  }, { type: 'triangle', cls: Triangle },
        { type: 'hexagon',  cls: Hexagon   }, { type: 'pentagon', cls: Pentagon }, { type: 'octagon',  cls: Octagon  }
      ];
      const match = builtInShapes.find(s => s.type === droppedType);
      if (!match) {
        return;
      }

      const label   = droppedType.charAt(0).toUpperCase() + droppedType.slice(1);
      const dropPos = this.renderer.clientToLocalPoint({ x: e.clientX, y: e.clientY });
      const node    = new match.cls(label.toUpperCase());
      const isSquarish = ['square', 'circle', 'diamond'].includes(droppedType);
      const w = isSquarish ? 80 : 140;
      const h = isSquarish ? 80 : 50;
      const openPos = this._findOpenPosition(dropPos.x - w / 2, dropPos.y - h / 2, w, h);
      const cell    = node._buildCell(openPos, joint.shapes);
      cell.attr('label/text', node._label);
      node.cell   = cell;
      node.editor = this;
      cell.addTo(this.graph);
      this.nodeMap.set(cell.id, node);
      this.clearSelection();
      (async () => {
        await this._waitForRender(cell);
        await this._resizeNodeAsync(cell);
        await this._waitForRender(cell);
        node.on('change', n => this.emit('node:change', n));
        node.on('move',   n => this.emit('node:move',   n));
        this._selectItem(node);
      })();
      this.emit('node:add', node);
    });

    this.nodePropertiesPanel.querySelector('[data-action="upload-image"]').addEventListener('click', () => {
      this.nodePropertiesPanel.querySelector('[data-action="image-file"]').click();
    });

    this.nodePropertiesPanel.querySelector('[data-action="image-file"]').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) {
        return;
      }
      const reader = new FileReader();
      reader.onload = ev => {
        this.nodePropertiesPanel.querySelector('[data-prop="imageUrl"]').value = ev.target.result;
        if (this.selection instanceof Node) {
          this.selection.imageUrl = ev.target.result;
        }
      };
      reader.readAsDataURL(file);
    });
  }

  _handleNodePropertyChange(e) {
    if (!(this.selection instanceof Node)) {
      return;
    }
    const input = e.target.closest('[data-prop]');
    if (!input) {
      return;
    }
    const prop  = input.dataset.prop;
    const value = input.type === 'number' ? parseFloat(input.value) : input.value;
    if (input.dataset.pair) {
      this.nodePropertiesPanel.querySelector(`[data-prop="${input.dataset.pair}"]`).value = value;
    }
    if (input.dataset.pairPicker) {
      this.nodePropertiesPanel.querySelector(`[data-prop="${input.dataset.pairPicker}"]`).value = value;
    }
    const resolvedProp = prop.endsWith('Hex') ? prop.slice(0, -3) : prop;
    if (resolvedProp in this.selection) {
      this.selection[resolvedProp] = value;
    }
  }

  _handleEdgePropertyChange(e) {
    if (!(this.selection instanceof Edge)) {
      return;
    }
    const input = e.target.closest('[data-prop]');
    if (!input) {
      return;
    }
    const prop  = input.dataset.prop;
    const value = input.type === 'number' ? parseFloat(input.value) : input.value;
    if (input.dataset.pair) {
      this.edgePropertiesPanel.querySelector(`[data-prop="${input.dataset.pair}"]`).value = value;
    }
    if (input.dataset.pairPicker) {
      this.edgePropertiesPanel.querySelector(`[data-prop="${input.dataset.pairPicker}"]`).value = value;
    }
    const resolvedProp = prop.endsWith('Hex') ? prop.slice(0, -3) : prop;
    if (resolvedProp in this.selection) {
      this.selection[resolvedProp] = value;
    }
  }

  // ══════════════════════════════════════════════════════════════
  // Internal: JointJS diagram event listeners
  // ══════════════════════════════════════════════════════════════
  _attachDiagramListeners() {
    const CustomSourceArrowhead = joint.linkTools.SourceArrowhead.extend({
      tagName: 'circle',
      attributes: { r: 6, fill: '#3498db', stroke: '#fff', 'stroke-width': 2, cursor: 'move' }
    });

    this.renderer.on('element:pointerdown', (view, e) => {
      const node = this.nodeMap.get(view.model.id);
      if (!node) {
        return;
      }
      this.pointerDownAt             = { x: e.clientX, y: e.clientY };
      this.selectionWasAlreadyActive = this.selection === node;
      this._deselectAll();
      if (!this._isMobile()) {
        node.cell.toFront();
      }
      this._selectItem(node);
    });

    this.renderer.on('element:pointerup', (view, e) => {
      const dx = Math.abs(e.clientX - (this.pointerDownAt?.x ?? e.clientX));
      const dy = Math.abs(e.clientY - (this.pointerDownAt?.y ?? e.clientY));
      if (dx < 5 && dy < 5 && this.selectionWasAlreadyActive && this.rightSidebar.classList.contains('wf-collapsed')) {
        this._toggleSidebar(this.rightSidebar);
      }
      this.pointerDownAt             = null;
      this.selectionWasAlreadyActive = false;
      if (!this._isMobile()) {
        const node = this.nodeMap.get(view.model.id);
        if (node) {
          const bbox    = node.cell.getBBox();
          const openPos = this._findOpenPosition(bbox.x, bbox.y, bbox.width, bbox.height, node.cell);
          node.cell.position(openPos.x, openPos.y);
        }
      }
    });

    this.renderer.on('link:pointerdown', view => {
      const edge = this.edgeMap.get(view.model.id);
      if (!edge) {
        return;
      }
      this._deselectAll();
      view.model.toFront();
      this._selectItem(edge);
      view.addTools(new joint.dia.ToolsView({ tools: [
        new joint.linkTools.Vertices(),
        new CustomSourceArrowhead(),
        new joint.linkTools.TargetArrowhead({ offset: -1 }),
        new joint.linkTools.Remove({ distance: 20 })
      ]}));
    });

    this.renderer.on('cell:pointerdown tool:pointerdown', (view, e) => {
      if (e?.target?.closest?.('.joint-port')) {
        this.renderer.el.classList.add('wf-dragging-link');
      }
    });

    this.renderer.on('cell:pointerup link:pointerup tool:pointerup', () => {
      this.renderer.el.classList.remove('wf-dragging-link');
    });

    this.renderer.on('cell:contextmenu', (view, e) => {
      e.preventDefault();
      const rect = this.canvasArea.getBoundingClientRect();
      this.contextMenu.style.display = 'block';
      this.contextMenu.style.left    = (e.clientX - rect.left) + 'px';
      this.contextMenu.style.top     = (e.clientY - rect.top)  + 'px';
      this.contextMenu.querySelector('[data-action="duplicate"]').style.display = this.nodeMap.has(view.model.id) ? 'flex' : 'none';
    });

    this.renderer.on('blank:pointerdown', e => {
      this._collapseAllSidebarsOnMobile();
      const startX          = e.clientX;
      const startY          = e.clientY;
      const initTranslation = this.renderer.translate();
      if (this._isMobile()) {
        this._deselectAll();
        return;
      }
      const onMove = mv => this.renderer.translate(
        initTranslation.tx + (mv.clientX - startX),
        initTranslation.ty + (mv.clientY - startY)
      );
      const onUp = up => {
        document.removeEventListener('mousemove', onMove);
        document.removeEventListener('mouseup',   onUp);
        if (Math.abs(up.clientX - startX) < 5 && Math.abs(up.clientY - startY) < 5) {
          this._deselectAll();
        }
      };
      document.addEventListener('mousemove', onMove);
      document.addEventListener('mouseup',   onUp);
    });

    this.renderer.on('link:connect', view => {
      const link       = view.model;
      const sourceCell = link.getSourceElement();
      const targetCell = link.getTargetElement();
      if (!sourceCell || !targetCell) {
        return;
      }
      const sourceNode = this.nodeMap.get(sourceCell.id);
      const targetNode = this.nodeMap.get(targetCell.id);
      if (!sourceNode || !targetNode || this.edgeMap.has(link.id)) {
        return;
      }
      const reverseExists = [...this.edgeMap.values()].some(e => e.source === targetNode && e.target === sourceNode);
      if (reverseExists) {
        link.remove();
        return;
      }
      const edge = new Edge(link, sourceNode, targetNode, this);
      this.edgeMap.set(link.id, edge);
      edge.on('change', ed => this.emit('edge:change', ed));
      this.emit('edge:add', edge);
    });

    this.graph.on('remove', cell => {
      if (cell.isLink()) {
        const edge = this.edgeMap.get(cell.id);
        if (edge) {
          this.edgeMap.delete(cell.id);
          this.emit('edge:remove', edge);
        }
      } else {
        const node = this.nodeMap.get(cell.id);
        if (node) {
          this.nodeMap.delete(cell.id);
          this.emit('node:remove', node);
        }
      }
    });

    this.graph.on('change:position', cell => {
      const node = this.nodeMap.get(cell.id);
      if (node) {
        this._updateConnectionPorts(cell);
        node.emit('move', node);
      }
    });
  }

  // ══════════════════════════════════════════════════════════════
  // Internal: keyboard shortcuts
  // ══════════════════════════════════════════════════════════════
  _attachKeyboardShortcuts() {
    this.clipboard = null;
    this.canvasArea.tabIndex     = 0;
    this.canvasArea.style.outline = 'none';
    this.canvasArea.focus();

    this.canvasArea.addEventListener('mousedown', () => {
      const tag = document.activeElement?.tagName;
      if (tag !== 'INPUT' && tag !== 'TEXTAREA') {
        this.canvasArea.focus();
      }
    });

    this.canvasArea.addEventListener('keydown', async e => {
      const tag      = document.activeElement?.tagName;
      const isTyping = tag === 'INPUT' || tag === 'TEXTAREA' || tag === 'SELECT';

      if (e.key === 'F2' || (!isTyping && e.key === 'Enter')) {
        if (this.selection instanceof Node || this.selection instanceof Edge) {
          e.preventDefault();
          if (this.rightSidebar.classList.contains('wf-collapsed')) {
            this._toggleSidebar(this.rightSidebar);
          }
          await this._waitForRender(this.selection.cell ?? this.selection.link);
          const panel      = this.selection instanceof Node ? this.nodePropertiesPanel : this.edgePropertiesPanel;
          const labelInput = panel.querySelector('[data-prop="label"]');
          if (labelInput) {
            labelInput.focus();
            labelInput.select();
          }
        }
        return;
      }

      if (isTyping) {
        return;
      }

      if (e.key === 'Escape') {
        e.preventDefault();
        this._deselectAll();
        return;
      }
      if (e.key === 'Delete' || e.key === 'Backspace') {
        e.preventDefault();
        this._deleteSelected();
        return;
      }
      if (e.key === '-' && !e.ctrlKey && !e.metaKey) {
        e.preventDefault();
        this.zoomOut();
        return;
      }
      if ((e.key === '=' || e.key === '+') && !e.ctrlKey && !e.metaKey) {
        e.preventDefault();
        this.zoomIn();
        return;
      }

      if ((e.ctrlKey || e.metaKey) && e.key === 'c') {
        if (this.selection instanceof Node) {
          e.preventDefault();
          this.clipboard = this.selection;
        }
        return;
      }

      if ((e.ctrlKey || e.metaKey) && e.key === 'v') {
        if (this.clipboard) {
          e.preventDefault();
          const bbox    = this.clipboard.cell.getBBox();
          const openPos = this._findOpenPosition(bbox.x + 40, bbox.y + 40, bbox.width, bbox.height);
          const cloned  = this.clipboard.cell.clone();
          cloned.position(openPos.x, openPos.y);
          cloned.addTo(this.graph);
          this._deselectAll();
          const copy  = new this.clipboard.constructor(this.clipboard.label);
          copy.cell   = cloned;
          copy.editor = this;
          this.nodeMap.set(cloned.id, copy);
          (async () => {
            await this._waitForRender(cloned);
            await this._resizeNodeAsync(cloned);
            await this._waitForRender(cloned);
            copy.on('change', n => this.emit('node:change', n));
            copy.on('move',   n => this.emit('node:move',   n));
            this._selectItem(copy);
          })();
          this.emit('node:add', copy);
        }
        return;
      }

      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight'].includes(e.key)) {
        e.preventDefault();
        const dx = e.key === 'ArrowLeft' ? -this.gridSize : e.key === 'ArrowRight' ? this.gridSize : 0;
        const dy = e.key === 'ArrowUp'   ? -this.gridSize : e.key === 'ArrowDown'  ? this.gridSize : 0;
        if (this.selection instanceof Node) {
          this.selection.moveBy(dx, dy);
        } else if (!this.selection) {
          const t = this.renderer.translate();
          this.renderer.translate(t.tx - dx, t.ty - dy);
        }
      }
    });
  }

  // ══════════════════════════════════════════════════════════════
  // Internal: touch gesture handling (mobile pan / pinch-zoom)
  // ══════════════════════════════════════════════════════════════
  _attachTouchListeners() {
    this.renderer.el.addEventListener('touchstart', e => {
      if (!this._isMobile()) {
        return;
      }
      if (e.touches.length === 1) {
        const touch = e.touches[0];
        if (document.elementFromPoint(touch.clientX, touch.clientY)?.closest('.joint-cell')) {
          return;
        }
        e.stopPropagation();
        this.touchState = {
          type:            'pan',
          startX:          touch.clientX,
          startY:          touch.clientY,
          initTranslation: this.renderer.translate()
        };
      } else if (e.touches.length === 2) {
        e.stopPropagation();
        const [t1, t2] = [e.touches[0], e.touches[1]];
        this.touchState = {
          type:            'pinch',
          initDistance:    this._touchDistance(t1, t2),
          initMidpoint:    this._touchMidpoint(t1, t2),
          initScale:       this.renderer.scale().sx,
          initTranslation: this.renderer.translate()
        };
      }
    }, { passive: true });

    this.renderer.el.addEventListener('touchmove', e => {
      if (!this._isMobile() || !this.touchState) {
        return;
      }
      e.preventDefault();
      const state = this.touchState;

      if (state.type === 'pan' && e.touches.length === 1) {
        const touch = e.touches[0];
        this.renderer.translate(
          state.initTranslation.tx + (touch.clientX - state.startX),
          state.initTranslation.ty + (touch.clientY - state.startY)
        );
      } else if (state.type === 'pinch' && e.touches.length === 2) {
        const [t1, t2] = [e.touches[0], e.touches[1]];
        const newScale  = Math.max(0.1, Math.min(10, state.initScale * this._touchDistance(t1, t2) / state.initDistance));
        const mid       = this._touchMidpoint(t1, t2);
        const rect      = this.renderer.el.getBoundingClientRect();
        const vpX       = mid.x - rect.left;
        const vpY       = mid.y - rect.top;
        const originX   = (vpX - state.initTranslation.tx) / state.initScale;
        const originY   = (vpY - state.initTranslation.ty) / state.initScale;
        this.renderer.scale(newScale, newScale);
        this.renderer.translate(vpX - originX * newScale, vpY - originY * newScale);
      }
    }, { passive: false });

    this.renderer.el.addEventListener('touchend', e => {
      if (!this._isMobile()) {
        return;
      }
      if (this.touchState?.type === 'pinch' && e.touches.length === 1) {
        const touch = e.touches[0];
        this.touchState = {
          type:            'pan',
          startX:          touch.clientX,
          startY:          touch.clientY,
          initTranslation: this.renderer.translate()
        };
      } else {
        this.touchState = null;
      }
    }, { passive: true });
  }

  // ══════════════════════════════════════════════════════════════
  // Internal: selection management
  // ══════════════════════════════════════════════════════════════
  _selectItem(item) {
    this.selection = item;
    const isNode   = item instanceof Node;
    const model    = isNode ? item.cell : item.link;
    const view     = this.renderer.findViewByModel(model);

    if (view) {
      view.el.classList.add('wf-selected');
      joint.highlighters.stroke.add(view, 'root', 'selection', {
        padding: 5,
        attrs: { stroke: '#3498db', 'stroke-width': 3 }
      });
    }

    this.propertiesHeaderActions.style.display = 'flex';
    this.propertiesHeaderActions.querySelector('[data-action="duplicate"]').style.display = isNode ? 'flex' : 'none';

    if (isNode) {
      this._showPropertiesPanel('node');
      this._fillNodeProperties(item);
    } else {
      this._showPropertiesPanel('edge');
      this._fillEdgeProperties(item);
    }

    this.emit('selection:change', item);
    this._updateMobileButtonVisibility();
  }

  _deselectAll() {
    if (this.selection) {
      const model = this.selection instanceof Node ? this.selection.cell : this.selection.link;
      this.renderer.findViewByModel(model)?.el.classList.remove('wf-selected');
    }
    this.renderer.removeTools();
    joint.highlighters.stroke.removeAll(this.renderer);
    this.selection = null;
    this.propertiesHeaderActions.style.display = 'none';
    this._showPropertiesPanel('none');
    this.emit('selection:change', null);
    this.canvasArea.focus();
    this._updateMobileButtonVisibility();
  }

  _showPropertiesPanel(which) {
    this.nodePropertiesPanel.style.display = which === 'node' ? 'flex' : 'none';
    this.edgePropertiesPanel.style.display = which === 'edge' ? 'flex' : 'none';
    this.noSelectionMessage.style.display  = which === 'none' ? 'block' : 'none';
  }

  _fillNodeProperties(node) {
    const panel = this.nodePropertiesPanel;
    const set   = (prop, val) => {
      const el = panel.querySelector(`[data-prop="${prop}"]`);
      if (el) {
        el.value = val ?? '';
      }
    };

    set('label',               node.label);
    set('labelFontSize',       node.labelFontSize);
    set('description',         node.description);
    set('imageUrl',            node.imageUrl);
    set('imageWidth',          node.imageWidth);
    set('imageHeight',         node.imageHeight);
    set('backgroundColor',     node.backgroundColor);
    set('backgroundColorHex',  node.backgroundColor);
    set('borderColor',         node.borderColor);
    set('borderColorHex',      node.borderColor);
    set('labelColor',          node.labelColor);
    set('labelColorHex',       node.labelColor);
    set('descriptionColor',    node.descriptionColor);
    set('descriptionColorHex', node.descriptionColor);

    panel.querySelector('.wf-custom-props')?.remove();
    const schema = node.getSchema?.() ?? {};
    if (!Object.keys(schema).length) {
      return;
    }

    const customSection = this._makeElement('div', 'wf-custom-props');
    const divider = customSection.appendChild(this._makeElement('div'));
    divider.style.cssText = 'border-top:1px solid #dee2e6;margin:4px 0;';

    Object.entries(schema).forEach(([key, def]) => {
      if (def.visible === false) {
        return;
      }

      const group = customSection.appendChild(this._makeElement('div', 'wf-prop-group'));
      const lbl   = group.appendChild(this._makeElement('label'));
      lbl.textContent = def.label ?? key;

      const current = node.getCustomProperty(key);
      let input;

      if (def.type === 'choice') {
        input = this._makeElement('select');
        Object.entries(def.choices ?? {}).forEach(([val, label]) => {
          const opt = input.appendChild(this._makeElement('option'));
          opt.value       = val;
          opt.textContent = label;
        });
        input.value = current ?? def.default;

      } else if (def.type === 'textarea') {
        input = this._makeElement('textarea');
        input.value = current ?? '';

      } else if (def.type === 'boolean') {
        input = this._makeElement('input');
        input.type    = 'checkbox';
        input.checked = current ?? def.default ?? false;
        input.style.cssText = 'width:auto !important;margin:0;cursor:pointer;align-self:flex-start;';
        group.appendChild(input);

      } else if (def.type === 'color') {
        const row    = group.appendChild(this._makeElement('div', 'wf-color-row'));
        const picker = this._makeElement('input');
        picker.type  = 'color';
        picker.value = current ?? def.default ?? '#000000';
        const hex    = this._makeElement('input');
        hex.type     = 'text';
        hex.value    = current ?? def.default ?? '#000000';
        picker.addEventListener('input', () => {
          hex.value = picker.value;
          node.setCustomProperty(key, picker.value);
        });
        hex.addEventListener('input', () => {
          picker.value = hex.value;
          node.setCustomProperty(key, hex.value);
        });
        row.appendChild(picker);
        row.appendChild(hex);
        group.appendChild(row);
        return;

      } else {
        input = this._makeElement('input');
        input.type  = def.type === 'number' ? 'number' : 'text';
        input.value = current ?? '';
        if (def.min !== undefined) {
          input.min = def.min;
        }
        if (def.max !== undefined) {
          input.max = def.max;
        }
      }

      if (def.readonly) {
        input.disabled = true;
      }
      group.appendChild(input);

      input.addEventListener(def.type === 'boolean' ? 'change' : 'input', () => {
        let newVal;
        if (def.type === 'boolean') {
          newVal = input.checked;
        } else if (def.type === 'number') {
          newVal = parseFloat(input.value);
        } else {
          newVal = input.value;
        }
        node.setCustomProperty(key, newVal);
      });
    });

    panel.appendChild(customSection);
  }

  _fillEdgeProperties(edge) {
    const panel = this.edgePropertiesPanel;
    const set   = (prop, val) => {
      const el = panel.querySelector(`[data-prop="${prop}"]`);
      if (el) {
        el.value = val ?? '';
      }
    };

    set('label',         edge.label);
    set('labelFontSize', edge.labelFontSize);
    set('labelColor',    edge.labelColor);
    set('labelColorHex', edge.labelColor);
    set('lineColor',     edge.lineColor);
    set('lineColorHex',  edge.lineColor);
    set('lineStyle',     edge.lineStyle);
    set('connectorType', edge.connectorType);
    set('sourceArrow',   edge.sourceArrow);
    set('targetArrow',   edge.targetArrow);
    set('description',   edge.description);
  }

  // ══════════════════════════════════════════════════════════════
  // Internal: sidebar collapse / expand
  // ══════════════════════════════════════════════════════════════
  _toggleSidebar(sidebar) {
    const isLeft          = sidebar === this.leftSidebar;
    const icon            = isLeft ? this.leftCollapseIcon : this.rightCollapseIcon;
    const prevTranslation = this.renderer.translate();
    const isNowCollapsed  = sidebar.classList.toggle('wf-collapsed');

    icon.style.transform = isNowCollapsed ? 'rotate(180deg)' : 'rotate(0deg)';
    sidebar.querySelector('.wf-collapsed-label').style.display = isNowCollapsed ? 'block' : 'none';

    if (this._isMobile() && !isNowCollapsed) {
      const other     = isLeft ? this.rightSidebar : this.leftSidebar;
      const otherIcon = isLeft ? this.rightCollapseIcon : this.leftCollapseIcon;
      if (!other.classList.contains('wf-collapsed')) {
        other.classList.add('wf-collapsed');
        otherIcon.style.transform = 'rotate(180deg)';
        other.querySelector('.wf-collapsed-label').style.display = 'block';
      }
    }

    const interval = setInterval(() => {
      const area = this.canvasArea;
      this.renderer.setDimensions(area.clientWidth, area.clientHeight);
      this.renderer.translate(prevTranslation.tx, prevTranslation.ty);
    }, 16);
    setTimeout(() => clearInterval(interval), 350);
    this._updateMobileButtonVisibility();
  }

  _setSidebarCollapsed(sidebar, collapsed) {
    const isLeft = sidebar === this.leftSidebar;
    const icon   = isLeft ? this.leftCollapseIcon : this.rightCollapseIcon;
    sidebar.classList.toggle('wf-collapsed', collapsed);
    icon.style.transform = collapsed ? 'rotate(180deg)' : 'rotate(0deg)';
    sidebar.querySelector('.wf-collapsed-label').style.display = collapsed ? 'block' : 'none';
  }

  _collapseAllSidebarsOnMobile() {
    if (!this._isMobile()) {
      return;
    }
    const prevTranslation = this.renderer.translate();
    this._setSidebarCollapsed(this.leftSidebar,  true);
    this._setSidebarCollapsed(this.rightSidebar, true);
    const interval = setInterval(() => {
      const area = this.canvasArea;
      this.renderer.setDimensions(area.clientWidth, area.clientHeight);
      this.renderer.translate(prevTranslation.tx, prevTranslation.ty);
    }, 16);
    setTimeout(() => clearInterval(interval), 350);
    this._updateMobileButtonVisibility();
  }

  // ══════════════════════════════════════════════════════════════
  // Internal: duplicate / delete actions
  // ══════════════════════════════════════════════════════════════
  _duplicateSelected() {
    if (!(this.selection instanceof Node)) {
      return;
    }
    const bbox    = this.selection.cell.getBBox();
    const openPos = this._findOpenPosition(bbox.x + 40, bbox.y + 40, bbox.width, bbox.height);
    const cloned  = this.selection.cell.clone();
    cloned.translate(openPos.x - bbox.x, openPos.y - bbox.y);
    cloned.addTo(this.graph);
    const copy  = new this.selection.constructor(this.selection.label);
    copy.cell   = cloned;
    copy.editor = this;
    this.nodeMap.set(cloned.id, copy);
    this._selectItem(copy);
    this.emit('node:add', copy);
  }

  _deleteSelected() {
    if (!this.selection) {
      return;
    }
    const item = this.selection;
    this._deselectAll();
    item.remove();
  }

  _focusCameraOnSelection() {
    if (!this.selection) {
      return;
    }
    const model  = this.selection instanceof Node ? this.selection.cell : this.selection.link;
    const center = model.getBBox().center();
    const size   = this.renderer.getComputedSize();
    this.renderer.scale(1, 1);
    this.renderer.translate(size.width / 2 - center.x, size.height / 2 - center.y);
  }

  // ══════════════════════════════════════════════════════════════
  // Internal: create an edge between two nodes
  // ══════════════════════════════════════════════════════════════
  _createEdge(sourceNode, targetNode, sourcePortIndex, targetPortIndex) {
    const reverseExists = [...this.edgeMap.values()].some(
      e => e.source === targetNode && e.target === sourceNode
    );
    if (reverseExists) {
      return null;
    }

    const link = new joint.shapes.standard.Link({
      attrs: { line: { stroke: '#495057', strokeWidth: 2, targetMarker: ARROW_MARKERS.classic } }
    });

    const sourcePorts = sourceNode.cell.getPorts();
    const targetPorts = targetNode.cell.getPorts();
    const srcPort     = sourcePortIndex !== null ? sourcePorts[sourcePortIndex - 1] : null;
    const tgtPort     = targetPortIndex !== null ? targetPorts[targetPortIndex - 1] : null;

    link.source(srcPort ? { id: sourceNode.cell.id, port: srcPort.id } : { id: sourceNode.cell.id });
    link.target(tgtPort ? { id: targetNode.cell.id, port: tgtPort.id } : { id: targetNode.cell.id });

    if (sourcePortIndex !== null) {
      link.set('sourcePort', sourcePortIndex);
    }
    if (targetPortIndex !== null) {
      link.set('targetPort', targetPortIndex);
    }

    this.graph.startBatch('edge');
    link.addTo(this.graph);
    this.graph.stopBatch('edge');
    this.renderer.updateViews();

    const edge = new Edge(link, sourceNode, targetNode, this);
    this.edgeMap.set(link.id, edge);
    edge.on('change', e => this.emit('edge:change', e));
    this.emit('edge:add', edge);
    return edge;
  }

  _getEdgesForNode(node) {
    return [...this.edgeMap.values()].filter(e => e.source === node || e.target === node);
  }

  // ══════════════════════════════════════════════════════════════
  // Internal: auto port distribution along edges
  // ══════════════════════════════════════════════════════════════
  _updateConnectionPorts(cell) {
    if (!this.autoPortsOn || this.isLoading) {
      return;
    }

    this.graph.getConnectedLinks(cell).forEach(link => {
      if (typeof link.get('sourcePort') === 'number') {
        return;
      }
      if (typeof link.get('targetPort') === 'number') {
        return;
      }

      const srcCell = link.getSourceElement();
      const tgtCell = link.getTargetElement();
      if (!srcCell || !tgtCell) {
        return;
      }

      const getCenter = el => {
        const pos  = el.position();
        const size = el.size();
        return { x: pos.x + size.width / 2, y: pos.y + size.height / 2 };
      };

      const getBestPort = (el, towardPoint) => {
        const center        = getCenter(el);
        const angleToward   = Math.atan2(towardPoint.y - center.y, towardPoint.x - center.x);
        const portPositions = el.getPortsPositions('all');
        const size          = el.size();
        let bestId = null, bestAngleDiff = Infinity;

        el.getPorts().forEach(port => {
          const pos = portPositions[port.id];
          if (!pos) {
            return;
          }
          const portAngle = Math.atan2(pos.y - size.height / 2, pos.x - size.width / 2);
          let diff = Math.abs(angleToward - portAngle);
          if (diff > Math.PI) {
            diff = 2 * Math.PI - diff;
          }
          if (diff < bestAngleDiff) {
            bestAngleDiff = diff;
            bestId        = port.id;
          }
        });
        return bestId;
      };

      const srcCenter   = getCenter(srcCell);
      const tgtCenter   = getCenter(tgtCell);
      const bestSrcPort = getBestPort(srcCell, tgtCenter);
      const bestTgtPort = getBestPort(tgtCell, srcCenter);

      if (link.source().port !== bestSrcPort) {
        link.source({ id: srcCell.id, port: bestSrcPort });
        link.unset('sourcePort');
      }
      if (link.target().port !== bestTgtPort) {
        link.target({ id: tgtCell.id, port: bestTgtPort });
        link.unset('targetPort');
      }
    });
  }

  // ══════════════════════════════════════════════════════════════
  // Internal: cell rendering helpers
  // ══════════════════════════════════════════════════════════════
  _waitForRender(cell) {
    return new Promise(resolve => {
      const view = this.renderer.findViewByModel(cell);
      if (!view) {
        resolve();
        return;
      }
      requestAnimationFrame(() => requestAnimationFrame(() => resolve(view)));
    });
  }

  async _resizeNodeAsync(cell) {
    this._fitNodeToContent(cell);
    await this._waitForRender(cell);
    this.renderer.updateViews();
  }

  _fitNodeToContent(cell) {
    const view = this.renderer.findViewByModel(cell);
    if (!view) {
      return;
    }

    const labelEl = view.el.querySelector('.label');
    const descEl  = view.el.querySelector('.descriptionLabel');
    if (!labelEl || !descEl) {
      return;
    }

    const fontScale = (cell.get('fontSizePercent') || 100) / 100;
    cell.attr({ label: { fontSize: 13 * fontScale }, descriptionLabel: { fontSize: 11 * fontScale } });

    const imageUrl   = cell.get('imageUrl');
    const shapeType  = cell.get('type');
    const descText   = cell.attr('descriptionLabel/text') || '';
    const imgW       = parseInt(cell.get('imageWidth')  || 32);
    const imgH       = parseInt(cell.get('imageHeight') || 32);
    const padding    = 15;
    const imgSpacing = imageUrl ? 10 : 0;

    const labelBBox  = labelEl.getBBox();
    const descBBox   = descEl.getBBox();
    const textW      = Math.max(labelBBox.width, descBBox.width);
    const totalW     = (imageUrl ? imgW : 0) + imgSpacing + textW;

    let w = Math.max(140, padding + totalW + padding);
    const totalTextH = descText ? labelBBox.height + descBBox.height : labelBBox.height;
    let h = Math.max(50, padding + Math.max(imageUrl ? imgH : 0, totalTextH) + padding);

    if (shapeType === 'diamond' || shapeType === 'circle') {
      w = h = Math.max(w, h);
    } else if (['triangle', 'hexagon', 'pentagon', 'octagon'].includes(shapeType)) {
      if (w / h > 1.2) {
        h = w / 1.2;
      } else {
        w = h * 1.2;
      }
      if (shapeType === 'triangle') {
        w *= 1.25;
        h *= 1.25;
      }
    }

    const contentStartX = (w - totalW) / 2;
    const textCenterX   = contentStartX + (imageUrl ? imgW : 0) + imgSpacing + textW / 2;

    cell.attr('image', { refX: 0, refX2: contentStartX, refY: 0.5, y: -imgH / 2, width: imgW, height: imgH });

    if (descText) {
      const contentStartY = (h - totalTextH) / 2;
      cell.attr('label', {
        refX: 0, refX2: textCenterX,
        refY: 0, refY2: contentStartY + labelBBox.height / 2,
        textAnchor: 'middle', textVerticalAnchor: 'middle'
      });
      cell.attr('descriptionLabel', {
        refX: 0, refX2: textCenterX,
        refY: 0, refY2: contentStartY + labelBBox.height + descBBox.height / 2,
        textAnchor: 'middle', textVerticalAnchor: 'middle'
      });
    } else {
      cell.attr('label', {
        refX: 0, refX2: textCenterX,
        refY: 0.5, refY2: 0,
        textAnchor: 'middle', textVerticalAnchor: 'middle'
      });
    }

    cell.resize(w, h);
  }

  // ══════════════════════════════════════════════════════════════
  // Internal: utility helpers
  // ══════════════════════════════════════════════════════════════
  _isMobile() {
    return window.matchMedia('(pointer:coarse) and (max-width:767px)').matches;
  }

  _makeElement(tag, className = '') {
    const el = document.createElement(tag);
    if (className) {
      el.className = className;
    }
    return el;
  }

  _makeZoomButton(parent, title, html) {
    const btn = parent.appendChild(this._makeElement('button', 'wf-ctrl-btn'));
    btn.title     = title;
    btn.innerHTML = html;
    return btn;
  }

  _zoomAtPoint(factor, clientX, clientY) {
    const current     = this.renderer.scale().sx;
    const newScale    = Math.max(0.1, Math.min(10, current * factor));
    const rect        = this.renderer.el.getBoundingClientRect();
    const vpX         = clientX - rect.left;
    const vpY         = clientY - rect.top;
    const translation = this.renderer.translate();
    const originX     = (vpX - translation.tx) / current;
    const originY     = (vpY - translation.ty) / current;
    this.renderer.scale(newScale, newScale);
    this.renderer.translate(vpX - originX * newScale, vpY - originY * newScale);
  }

  _zoomAtCenter(factor) {
    const rect = this.renderer.el.getBoundingClientRect();
    this._zoomAtPoint(factor, rect.left + rect.width / 2, rect.top + rect.height / 2);
  }

  _findOpenPosition(startX, startY, w, h, excludeCell = null) {
    const clearance = this.clearanceUnits * this.gridSize;
    let x = Math.round(startX / this.gridSize) * this.gridSize;
    let y = Math.round(startY / this.gridSize) * this.gridSize;

    const isBlocked = (testX, testY) => {
      const testRect = new joint.g.Rect(testX, testY, w, h).inflate(clearance);
      return this.graph.getElements().some(el => {
        if (excludeCell && el.id === excludeCell.id) {
          return false;
        }
        return testRect.intersect(el.getBBox().clone().inflate(clearance));
      });
    };

    if (!isBlocked(x, y)) {
      return { x, y };
    }

    for (let radius = 1; radius < 30; radius++) {
      for (let dx = -radius; dx <= radius; dx++) {
        for (let dy = -radius; dy <= radius; dy++) {
          if (Math.abs(dx) !== radius && Math.abs(dy) !== radius) {
            continue;
          }
          const tx = x + dx * this.gridSize;
          const ty = y + dy * this.gridSize;
          if (!isBlocked(tx, ty)) {
            return { x: tx, y: ty };
          }
        }
      }
    }

    return { x, y };
  }

  _touchDistance(t1, t2) {
    const dx = t1.clientX - t2.clientX;
    const dy = t1.clientY - t2.clientY;
    return Math.sqrt(dx * dx + dy * dy);
  }

  _touchMidpoint(t1, t2) {
    return {
      x: (t1.clientX + t2.clientX) / 2,
      y: (t1.clientY + t2.clientY) / 2
    };
  }
}

    effort:   { label: 'Effort',   type: 'number',   default: 1, min: 1, max: 10 },
    done:     { label: 'Done',     type: 'boolean',  default: false },
    mode:     { label: 'Mode',     type: 'choice',   default: 'auto', choices: { auto: 'Automatic', manual: 'Manual' } },
    note:     { label: 'Note',     type: 'textarea', default: '' },
    accent:   { label: 'Accent',   type: 'color',    default: '#3498db' },

    node.backgroundColor = node.getCustomProperty('done') ? '#d4edda' : '#f0f8ff';
    node.borderColor     = node.getCustomProperty('done') ? '#28a745' : '#adb5bd';
  }
);
editor.registerNodeType('Task', TaskNode);

(async () => {
  const start   = await editor.addNode(new Ellipse({ label: 'START' }));
